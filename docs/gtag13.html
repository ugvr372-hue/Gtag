<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mini Gorilla Tag VR Fix</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.1/dist/aframe-physics-system.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #vrPrompt { 
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: white; padding: 20px; font-family: sans-serif; border-radius: 10px;
      text-align: center; z-index: 10;
    }
    #vrPrompt button { margin: 10px; padding: 10px 20px; font-size: 16px; }
  </style>
</head>
<body>
<div id="vrPrompt">
  <p>Do you want to play in VR mode?</p>
  <button id="yesVR">Yes</button>
  <button id="noVR">No</button>
</div>

<a-scene id="scene" style="display:none;" physics="gravity: -9.8">
  <a-box position="0 1 -3" depth="1" height="1" width="1" color="red"></a-box>
</a-scene>

<script>
window.onload = function(){
  const vrPrompt = document.getElementById('vrPrompt');
  const scene = document.getElementById('scene');

  document.getElementById('yesVR').onclick = () => {
    vrPrompt.style.display = 'none';
    scene.style.display = 'block';
    scene.enterVR(); // now guaranteed to run on user click
  };

  document.getElementById('noVR').onclick = () => {
    vrPrompt.style.display = 'none';
    scene.style.display = 'block';
  };
};
</script>
</body>
</html>
