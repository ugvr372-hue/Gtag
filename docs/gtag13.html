<!DOCTYPE html>
<html lang="en">
<head>
    <title>BO4 QUEST 3 VR</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #overlay {
            position: absolute; width: 100%; height: 100%; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 30px; box-sizing: border-box; z-index: 10;
        }
        .round { color: #ff0000; font-size: 60px; font-weight: bold; }
        .stats { color: #fff; font-size: 20px; text-shadow: 2px 2px #000; }
        .pts { color: #00ff00; font-size: 40px; }
        #hp-bar { width: 250px; height: 15px; background: rgba(0,0,0,0.7); border: 2px solid #444; }
        #hp-fill { width: 100%; height: 100%; background: #c00; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="round" id="rd">1</div>
        <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <div class="stats">
                <div id="hp-txt">HP: 100/100</div>
                <div id="hp-bar"><div id="hp-fill"></div></div>
                <div style="margin-top:10px">AMMO: 30/120</div>
            </div>
            <div class="pts" id="pts">500</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0/build/three.module.js';
        import { VRButton } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/webxr/VRButton.js';
        import { XRControllerModelFactory } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/webxr/XRControllerModelFactory.js';

        // --- GAME LOGIC ---
        let game = { round: 1, hp: 100, pts: 500, zombies: [], spawned: 0, total: 6 };

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x0a0015, 0.06); // Dark Purple Haze

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // --- QUEST 3 VR ACTIVATION ---
        document.body.appendChild(VRButton.createButton(renderer));

        // --- TACTICAL LIGHTING ---
        const ambient = new THREE.AmbientLight(0x0a0a0a); 
        scene.add(ambient);

        // Flashlight attached to the right controller
        const flashlight = new THREE.SpotLight(0xffffff, 4, 30, Math.PI/7, 0.4);
        flashlight.castShadow = true;

        // --- WORLD DESIGN ---
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 200),
            new THREE.MeshStandardMaterial({ color: 0x050505 })
        );
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        // Skyscraper District
        for(let i=0; i<40; i++) {
            const h = 20 + Math.random() * 60;
            const b = new THREE.Mesh(
                new THREE.BoxGeometry(8, h, 8),
                new THREE.MeshStandardMaterial({ color: 0x050508 })
            );
            b.position.set(Math.random()*160-80, h/2, Math.random()*160-80);
            scene.add(b);
        }

        // --- CONTROLLERS & WEAPON ---
        const controller1 = renderer.xr.getController(0); // Left
        const controller2 = renderer.xr.getController(1); // Right
        scene.add(controller1, controller2);

        // Tactical M4-style Gun (Cyan/Magenta Trims)
        const gun = new THREE.Group();
        const gBody = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.5), new THREE.MeshBasicMaterial({color: 0x000000}));
        const cyan = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.01, 0.51), new THREE.MeshBasicMaterial({color: 0x00ffff}));
        cyan.position.y = 0.06;
        const mag = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.01, 0.51), new THREE.MeshBasicMaterial({color: 0xff00ff}));
        mag.position.y = -0.06;
        gun.add(gBody, cyan, mag);
        
        // Attach Gun and Flashlight to Right Hand
        controller2.add(gun);
        controller2.add(flashlight);
        controller2.add(flashlight.target);
        flashlight.target.position.set(0, 0, -1);

        // --- ZOMBIE SYSTEM ---
        class Zombie {
            constructor() {
                this.mesh = new THREE.Mesh(
                    new THREE.BoxGeometry(0.8, 2, 0.8),
                    new THREE.MeshStandardMaterial({ color: 0x111111 })
                );
                this.mesh.position.set(Math.random()*40-20, 1, Math.random()*40-20);
                scene.add(this.mesh);
                game.zombies.push(this);
            }
            update() {
                const headPos = new THREE.Vector3();
                renderer.xr.getCamera(camera).getWorldPosition(headPos);
                const dir = new THREE.Vector3().subVectors(headPos, this.mesh.position).normalize();
                this.mesh.position.add(new THREE.Vector3(dir.x, 0, dir.z).multiplyScalar(0.03));
                this.mesh.lookAt(headPos.x, 1, headPos.z);

                if(this.mesh.position.distanceTo(headPos) < 1.5) {
                    game.hp -= 0.2;
                    updateUI();
                }
            }
        }

        function updateUI() {
            document.getElementById('hp-fill').style.width = game.hp + '%';
            document.getElementById('pts').innerText = game.pts;
            document.getElementById('rd').innerText = game.round;
        }

        // --- SHOOTING ---
        controller2.addEventListener('selectstart', () => {
            const raycaster = new THREE.Raycaster();
            const tempMatrix = new THREE.Matrix4().extractRotation(controller2.matrixWorld);
            raycaster.ray.origin.setFromMatrixPosition(controller2.matrixWorld);
            raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

            const intersects = raycaster.intersectObjects(game.zombies.map(z => z.mesh));
            if(intersects.length > 0) {
                const zObj = game.zombies.find(z => z.mesh === intersects[0].object);
                scene.remove(zObj.mesh);
                game.zombies.splice(game.zombies.indexOf(zObj), 1);
                game.pts += 100;
                updateUI();
            }
        });

        // --- RENDER LOOP ---
        renderer.setAnimationLoop(() => {
            if (game.spawned < game.total && game.zombies.length < 4) {
                new Zombie();
                game.spawned++;
            }
            if (game.zombies.length === 0 && game.spawned >= game.total) {
                game.round++;
                game.total += 3;
                game.spawned = 0;
                updateUI();
            }
            game.zombies.forEach(z => z.update());
            renderer.render(scene, camera);
        });
    </script>
</body>
</html>
