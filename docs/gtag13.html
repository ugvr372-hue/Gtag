<!DOCTYPE html>
<html>
  <head>
    <title>Poppy Sandbox VR - Quest 3</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene xr-mode-ui="enabled: true" webxr="referenceSpaceType: local-floor">
      
      <a-entity environment="preset: contact; groundColor: #444; grid: cross"></a-entity>

      <a-entity id="rig">
        <a-camera position="0 1.6 0"></a-camera>
        <a-entity laser-controls="hand: left" raycaster="objects: .menu-button; far: 5"></a-entity>
        <a-entity laser-controls="hand: right" raycaster="objects: .monster; far: 10" id="right-hand">
            <a-box position="0 0 -0.2" scale="0.05 0.05 0.2" color="black"></a-box> </a-entity>
      </a-entity>

      <a-entity id="menu" position="0 1.5 -1" rotation="-20 0 0">
        <a-plane color="#222" height="0.6" width="1" opacity="0.8"></a-plane>
        
        <a-text value="SPAWN MENU" align="center" position="0 0.22 0.01" scale="0.3 0.3 0.3"></a-text>
        
        <a-plane class="menu-button" color="blue" height="0.1" width="0.4" position="0 0.05 0.02" 
                 onclick="spawnMonster('blue', 'Huggy')">
            <a-text value="Huggy" align="center" scale="0.2 0.2 0.2"></a-text>
        </a-plane>

        <a-plane class="menu-button" color="purple" height="0.1" width="0.4" position="0 -0.1 0.02" 
                 onclick="spawnMonster('purple', 'Catnap')">
            <a-text value="Catnap" align="center" scale="0.2 0.2 0.2"></a-text>
        </a-plane>
      </a-entity>

      <a-entity id="monster-container"></a-entity>

    </a-scene>

    <script>
      // Logic to spawn monsters in VR space
      function spawnMonster(color, name) {
        const container = document.querySelector('#monster-container');
        const newMonster = document.createElement('a-entity');
        
        // Random position in front of player
        const x = (Math.random() - 0.5) * 4;
        const z = -3 - (Math.random() * 2);
        
        newMonster.setAttribute('position', `${x} 0 ${z}`);
        newMonster.setAttribute('class', 'monster');
        
        // Build the monster out of shapes (No PNGs/Downloads)
        if (name === 'Huggy') {
            newMonster.innerHTML = `
                <a-box color="${color}" position="0 1 0" scale="0.6 2 0.4"></a-box> <a-sphere color="${color}" position="0 2.2 0" scale="0.4 0.4 0.4"></a-sphere> `;
        } else {
            newMonster.innerHTML = `
                <a-sphere color="${color}" position="0 0.5 0" scale="0.8 0.8 0.8"></a-sphere> <a-sphere color="${color}" position="0 1.2 0" scale="0.5 0.5 0.5"></a-sphere> `;
        }

        // Click monster with Right Controller to "kill" it
        newMonster.addEventListener('click', function () {
            this.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 200');
            setTimeout(() => this.remove(), 200);
        });

        container.appendChild(newMonster);
      }

      // Handle Right Trigger for "Shooting"
      document.querySelector('#right-hand').addEventListener('triggerdown', function () {
          // A-Frame laser-controls handles the 'click' event automatically via raycaster
          console.log("Trigger Pressed");
      });
    </script>
  </body>
</html>
