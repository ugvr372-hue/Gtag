<!DOCTYPE html>
<html>
  <head>
    <title>DINOVR:vr tengeram</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
  </head>
  <body style="background: #000;">
    <a-scene webxr="requiredFeatures: local-floor" fog="type: exponential; color: #000; density: 0.15">
      
      <a-plane rotation="-90 0 0" width="100" height="100" color="#111"></a-plane>
      <a-sky color="black"></a-sky>

      <a-entity id="huggy" position="0 0 -15" visible="false">
          <a-box width="0.1" height="3" depth="0.1" position="0.2 1.5 0" color="#0033cc"></a-box>
          <a-box width="0.1" height="3" depth="0.1" position="-0.2 1.5 0" color="#0033cc"></a-box>
          <a-box width="0.5" height="1.5" depth="0.3" position="0 3.5 0" color="#0033cc">
              <a-sphere color="white" radius="0.1" position="-0.15 0.4 0.3"></a-sphere>
              <a-sphere color="white" radius="0.1" position="0.15 0.4 0.3"></a-sphere>
              <a-box width="0.4" height="0.1" color="red" position="0 0 0.31"></a-box>
          </a-box>
      </a-entity>

      <a-entity id="rig" movement-controls="speed: 0.15; fly: false">
        <a-entity camera position="0 1.6 0" look-controls>
            <a-light type="spot" intensity="1" distance="15"></a-light>
            <a-cursor fuse="false" raycaster="objects: .menu-btn"></a-cursor>
        </a-entity>

        <a-entity id="leftHand" oculus-touch-controls="hand: left" menu-controller>
            <a-entity id="gtag-menu" visible="false" position="0.1 0.1 -0.1" rotation="-45 0 0">
                <a-plane width="0.25" height="0.4" color="#222">
                    <a-text value="DINOVR v1.0" align="center" position="0 0.15 0.01" scale="0.12 0.12 0.12" color="yellow"></a-text>
                    
                    <a-plane id="btn-god" class="menu-btn" width="0.2" height="0.05" position="0 0.05 0.01" color="#444">
                        <a-text id="txt-god" value="GOD MODE: OFF" align="center" scale="0.08 0.08 0.08"></a-text>
                    </a-plane>

                    <a-plane id="btn-fly" class="menu-btn" width="0.2" height="0.05" position="0 -0.02 0.01" color="#444">
                        <a-text id="txt-fly" value="FLY: OFF" align="center" scale="0.08 0.08 0.08"></a-text>
                    </a-plane>

                    <a-plane id="btn-kill" class="menu-btn" width="0.2" height="0.05" position="0 -0.09 0.01" color="#444">
                        <a-text value="FREEZE HUGGY" align="center" scale="0.08 0.08 0.08"></a-text>
                    </a-plane>
                </a-plane>
            </a-entity>
        </a-entity>

        <a-entity id="rightHand" oculus-touch-controls="hand: right" grabpack-logic>
            <a-entity id="grab-hand" position="0 0 -0.1">
                <a-box width="0.1" height="0.1" depth="0.05" color="red"></a-box>
            </a-entity>
        </a-entity>
      </a-entity>

    </a-scene>

    <script>
      let mods = { god: false, fly: false, freeze: false };
      let huggyStarted = false;

      // --- MENU LOGIC ---
      AFRAME.registerComponent('menu-controller', {
          init: function() {
              const menu = document.querySelector('#gtag-menu');
              this.el.addEventListener('xbuttondown', () => menu.setAttribute('visible', !menu.getAttribute('visible')));
              
              // Button Clicks
              document.querySelector('#btn-god').addEventListener('click', () => {
                  mods.god = !mods.god;
                  document.querySelector('#txt-god').setAttribute('value', mods.god ? "GOD MODE: ON" : "GOD MODE: OFF");
                  document.querySelector('#btn-god').setAttribute('color', mods.god ? "green" : "#444");
              });

              document.querySelector('#btn-fly').addEventListener('click', () => {
                  mods.fly = !mods.fly;
                  document.querySelector('#txt-fly').setAttribute('value', mods.fly ? "FLY: ON" : "FLY: OFF");
                  document.querySelector('#btn-fly').setAttribute('color', mods.fly ? "green" : "#444");
                  document.querySelector('#rig').setAttribute('movement-controls', `fly: ${mods.fly}`);
              });

              document.querySelector('#btn-kill').addEventListener('click', () => {
                  mods.freeze = !mods.freeze;
                  document.querySelector('#btn-kill').setAttribute('color', mods.freeze ? "green" : "#444");
              });
          }
      });

      // --- GRABPACK ---
      AFRAME.registerComponent('grabpack-logic', {
          init: function() {
              const hand = document.querySelector('#grab-hand');
              this.el.addEventListener('triggerdown', () => {
                  hand.setAttribute('animation', 'property: position; to: 0 0 -10; dur: 300; dir: alternate; loop: 1');
                  if(!huggyStarted) {
                      huggyStarted = true;
                      document.querySelector('#huggy').setAttribute('visible', 'true');
                  }
              });
          }
      });

      // --- HUGGY AI ---
      setInterval(() => {
          if(!huggyStarted || mods.freeze) return;
          const h = document.querySelector('#huggy');
          const r = document.querySelector('#rig');
          h.object3D.lookAt(r.object3D.position.x, 0, r.object3D.position.z);
          h.object3D.translateZ(0.08);

          if(!mods.god && h.object3D.position.distanceTo(r.object3D.position) < 1.5) {
              location.reload();
          }
      }, 20);
    </script>
  </body>
</html>
