<!DOCTYPE html>
<html>
  <head>
    <title>Quest 3 Fixed VR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene webxr="referenceSpaceType: local-floor" xr-mode-ui="enabled: true">
      
      <a-assets>
        <a-asset-item id="hand" src="https://vazxmixjsiawhamurptx.supabase.co/storage/v1/object/public/models/hand-left/model.gltf"></a-asset-item>
      </a-assets>

      <a-entity environment="preset: osiris; dressingAmount: 80; ground: hills; lighting: point; shadow: false"></a-entity>

      <a-entity id="rig" movement-controls="fly: false; speed: 0.2">
        <a-entity camera position="0 1.6 0" look-controls="pointerLockEnabled: true"></a-entity>
        
        <a-entity id="left-hand" oculus-touch-controls="hand: left">
            <a-gltf-model src="#hand" material="color: blue" scale="1.5 1.5 1.5"></a-gltf-model>
            
            <a-entity id="wrist-menu" position="0.1 0.1 0.1" rotation="-90 0 0" visible="false">
                <a-plane color="#111" height="0.5" width="0.35" opacity="0.9">
                    <a-text value="SANDBOX" align="center" position="0 0.2 0.01" scale="0.15 0.15 0.15"></a-text>
                    
                    <a-plane class="menu-btn" color="#0033ff" position="0 0.05 0.02" width="0.25" height="0.08" onclick="spawn('huggy')">
                        <a-text value="Huggy" align="center" scale="0.12 0.12 0.12"></a-text>
                    </a-plane>
                    
                    <a-plane class="menu-btn" color="#6600cc" position="0 -0.05 0.02" width="0.25" height="0.08" onclick="spawn('catnap')">
                        <a-text value="Catnap" align="center" scale="0.12 0.12 0.12"></a-text>
                    </a-plane>

                    <a-plane class="menu-btn" color="red" position="0 -0.18 0.02" width="0.25" height="0.08" onclick="location.reload()">
                        <a-text value="RESET WORLD" align="center" scale="0.1 0.1 0.1"></a-text>
                    </a-plane>
                </a-plane>
            </a-entity>
        </a-entity>

        <a-entity id="right-hand" oculus-touch-controls="hand: right" laser-controls="hand: right" raycaster="objects: .menu-btn, .monster; far: 10">
            <a-gltf-model src="#hand" material="color: red" scale="1.5 1.5 1.5"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity id="monster-spawn-root"></a-entity>

    </a-scene>

    <script>
      // Stable Menu Toggle (X/Y Buttons)
      const leftHand = document.querySelector('#left-hand');
      const menu = document.querySelector('#wrist-menu');

      leftHand.addEventListener('xbuttondown', () => menu.setAttribute('visible', !menu.getAttribute('visible')));
      leftHand.addEventListener('ybuttondown', () => menu.setAttribute('visible', !menu.getAttribute('visible')));

      function spawn(type) {
        const root = document.querySelector('#monster-spawn-root');
        const monster = document.createElement('a-entity');
        monster.setAttribute('position', `${(Math.random()-0.5)*8} 0 -5`);
        monster.setAttribute('class', 'monster');

        if(type === 'huggy') {
            monster.innerHTML = `
                <a-box color="blue" position="0 1.5 0" scale="0.5 2.5 0.3"></a-box>
                <a-sphere color="blue" position="0 3 0" radius="0.35"></a-sphere>
                <a-cylinder color="blue" position="0.4 1.5 0" radius="0.04" height="2.2"></a-cylinder>
                <a-cylinder color="blue" position="-0.4 1.5 0" radius="0.04" height="2.2"></a-cylinder>
            `;
        } else {
            monster.innerHTML = `
                <a-box color="purple" position="0 0.5 0" scale="0.7 0.5 1"></a-box>
                <a-sphere color="purple" position="0 1.1 0.3" radius="0.3"></a-sphere>
                <a-cylinder color="purple" position="0 0.5 -0.6" rotation="45 0 0" radius="0.02" height="1"></a-cylinder>
            `;
        }

        monster.addEventListener('click', function() {
          this.remove();
        });

        root.appendChild(monster);
      }
    </script>
  </body>
</html>
