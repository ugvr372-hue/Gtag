<!DOCTYPE html>
<html>
  <head>
    <title>BEYOND | Instant Start</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/n5ro/aframe-physics-system@v4.0.1/dist/aframe-physics-system.min.js"></script>
  </head>
  <body>
    <a-scene physics="driver: local; gravity: -9.8; iterations: 30" renderer="antialias: true">
      
      <a-assets timeout="3000"> <a-asset-item id="hand-l" src="https://vazxmixjsiawhamurptx.supabase.co/storage/v1/object/public/models/hand-left/model.gltf"></a-asset-item>
        <a-asset-item id="hand-r" src="https://vazxmixjsiawhamurptx.supabase.co/storage/v1/object/public/models/hand-right/model.gltf"></a-asset-item>
      </a-assets>

      <a-box static-body position="0 -0.5 0" width="100" height="1" depth="100" color="#111"></a-box>
      <a-sky color="#050505"></a-sky>
      <a-light type="ambient" intensity="0.5"></a-light>
      <a-light type="point" position="2 4 2" intensity="1"></a-light>

      <a-entity id="rig" movement-controls="speed: 0.2" kinematic-body>
        <a-entity camera position="0 1.6 0" look-controls></a-entity>

        <a-entity id="left-hand" oculus-touch-controls="hand: left">
            <a-gltf-model src="#hand-l" scale="1.4 1.4 1.4"></a-gltf-model>
            <a-entity id="menu" position="0 0.15 0" rotation="-45 0 0" visible="false">
                <a-plane color="#000" height="0.4" width="0.3">
                    <a-text value="BEYOND" align="center" position="0 0.15 0.01" scale="0.1 0.1 0.1" color="red"></a-text>
                    <a-plane class="btn" color="#333" position="0 0 0.02" width="0.25" height="0.08" onclick="spawnNPC()">
                        <a-text value="SPAWN NPC" align="center" scale="0.08 0.08 0.08"></a-text>
                    </a-plane>
                </a-plane>
            </a-entity>
        </a-entity>

        <a-entity id="right-hand" oculus-touch-controls="hand: right" laser-controls="hand: right" raycaster="objects: .btn, .npc; far: 50">
            <a-gltf-model src="#hand-r" scale="1.4 1.4 1.4"></a-gltf-model>
            <a-box id="gun" color="#222" scale="0.03 0.06 0.2" position="0 0 -0.1"></a-box>
        </a-entity>
      </a-entity>

      <a-entity id="world"></a-entity>

    </a-scene>

    <script>
      // Force menu toggle on X
      document.querySelector('#left-hand').addEventListener('xbuttondown', () => {
          const m = document.querySelector('#menu');
          m.setAttribute('visible', !m.getAttribute('visible'));
      });

      // Simple, fast NPC spawner
      window.spawnNPC = function() {
          const e = document.createElement('a-entity');
          e.setAttribute('position', {x: (Math.random()-0.5)*5, y: 1, z: -4});
          e.innerHTML = `
            <a-box class="npc" color="#b00" scale="0.5 1.5 0.3" dynamic-body="mass: 5"></a-box>
            <a-sphere class="npc" color="#eee" position="0 1 0" radius="0.25" dynamic-body="mass: 1"></a-sphere>
          `;
          document.querySelector('#world').appendChild(e);
      };

      // Gun Shooting (Gore)
      document.querySelector('#right-hand').addEventListener('triggerdown', function() {
          const ray = this.components.raycaster;
          const hit = ray.getIntersection(document.querySelector('.npc'));
          
          if (hit) {
              // Apply Force (Beyond Style)
              if (hit.el.body) {
                  hit.el.body.applyImpulse(new CANNON.Vec3(0, 5, -10), new CANNON.Vec3().copy(hit.point));
              }
              // Simple "Red Flash" Gore
              hit.el.setAttribute('color', '#ff0000');
              setTimeout(() => hit.el.setAttribute('color', '#b00'), 100);
          }
      });
    </script>
  </body>
</html>
