<!DOCTYPE html>
<html>
  <head>
    <title>THE PERFECT VR SANDBOX</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/n5ro/aframe-physics-system@v4.0.1/dist/aframe-physics-system.min.js"></script>
  </head>
  <body>
    <a-scene physics="driver: local; gravity: -9.8; iterations: 30" renderer="antialias: true">
      
      <a-sky color="#050505"></a-sky>
      <a-entity light="type: ambient; intensity: 0.4"></a-entity>
      <a-entity light="type: point; intensity: 1.5; position: 0 5 0; castShadow: true"></a-entity>

      <a-box static-body 
             position="0 -2.5 0" 
             width="100" height="5" depth="100" 
             color="#111" roughness="1">
      </a-box>

      <a-entity id="rig" movement-controls="fly: false; speed: 0.2">
        <a-entity camera position="0 1.6 0" look-controls></a-entity>
        
        <a-entity id="leftHand" hand-controls="hand: left" sphere-collider="objects: .interactable"></a-entity>
        
        <a-entity id="rightHand" hand-controls="hand: right" sphere-collider="objects: .interactable">
          <a-box position="0 0 0.2" width="0.05" height="0.05" depth="0.4" color="#222"></a-box>
          <a-box position="0 -0.05 -0.1" width="0.03" height="0.1" depth="0.2" color="black" rotation="-45 0 0"></a-box>
        </a-entity>
      </a-entity>

      <a-entity id="targets">
        <a-box class="interactable" dynamic-body position="0 1 -3" color="#ff4444"></a-box>
        <a-box class="interactable" dynamic-body position="0.5 2 -3" color="#ff4444"></a-box>
        <a-box class="interactable" dynamic-body position="-0.5 0.5 -3" color="#ff4444"></a-box>
      </a-entity>

    </a-scene>

    <script>
      // SHOOTING LOGIC: Press trigger to fire physics balls
      window.addEventListener('triggerdown', function (evt) {
        let scene = document.querySelector('a-scene');
        let bullet = document.createElement('a-sphere');
        
        // Get hand position and direction
        let hand = document.querySelector('#rightHand').object3D;
        let worldPos = new THREE.Vector3();
        hand.getWorldPosition(worldPos);

        bullet.setAttribute('radius', '0.03');
        bullet.setAttribute('color', 'yellow');
        bullet.setAttribute('position', worldPos);
        bullet.setAttribute('dynamic-body', 'mass: 0.5'); // Heavy bullets for impact
        
        scene.appendChild(bullet);

        // Shoot forward
        bullet.addEventListener('body-loaded', function () {
          const force = new CANNON.Vec3(0, 5, -50); 
          bullet.body.applyImpulse(force, new CANNON.Vec3(0,0,0));
        });
      });
    </script>
  </body>
</html>
