<!DOCTYPE html>
<html>
<head>
  <title>VR Tengeram</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #leaderboard {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 10px;
      font-family: Arial;
    }
  </style>
</head>
<body>

<div id="leaderboard">
  <h3>Leaderboard</h3>
  <ol id="scores"></ol>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";
import { VRButton } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/webxr/VRButton.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
camera.position.y = 1.6;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

// Light
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444));

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 200),
  new THREE.MeshStandardMaterial({ color: 0x228B22 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// 🌲 Forest
for (let i = 0; i < 80; i++) {
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.4, 4),
    new THREE.MeshStandardMaterial({ color: 0x8B4513 })
  );

  trunk.position.set(
    (Math.random() - 0.5) * 100,
    2,
    (Math.random() - 0.5) * 100
  );

  const leaves = new THREE.Mesh(
    new THREE.SphereGeometry(1.5),
    new THREE.MeshStandardMaterial({ color: 0x2E8B57 })
  );

  leaves.position.y = 2.5;
  trunk.add(leaves);
  scene.add(trunk);
}

// Controllers
const c1 = renderer.xr.getController(0);
const c2 = renderer.xr.getController(1);
scene.add(c1);
scene.add(c2);

// 🧠 LOCOMOTION (closest possible in HTML)
let vel = new THREE.Vector3();
let last1 = new THREE.Vector3();
let last2 = new THREE.Vector3();

function moveFromHand(controller, last) {
  const pos = new THREE.Vector3();
  controller.getWorldPosition(pos);

  if (last.lengthSq() === 0) {
    last.copy(pos);
    return;
  }

  const delta = pos.clone().sub(last);

  // Only apply when pushing downward or backward
  if (delta.length() > 0.01) {
    vel.x += -delta.x * 8;
    vel.z += -delta.z * 8;

    // jump push
    if (delta.y < -0.01) {
      vel.y += -delta.y * 6;
    }
  }

  last.copy(pos);
}

function updatePlayer() {
  camera.position.add(vel);

  // gravity
  vel.y -= 0.03;

  // friction
  vel.multiplyScalar(0.9);

  // ground collision
  if (camera.position.y < 1.6) {
    camera.position.y = 1.6;
    vel.y = 0;
  }
}

// 🏆 Leaderboard
let scores = JSON.parse(localStorage.getItem("vr_scores") || "[]");

function addScore() {
  const score = Math.floor(Math.random() * 100);
  scores.push(score);
  scores.sort((a,b)=>b-a);
  scores = scores.slice(0,5);
  localStorage.setItem("vr_scores", JSON.stringify(scores));
  renderScores();
}

function renderScores() {
  const list = document.getElementById("scores");
  list.innerHTML = "";
  scores.forEach(s => {
    const li = document.createElement("li");
    li.textContent = s;
    list.appendChild(li);
  });
}

renderScores();

// trigger = add score
c1.addEventListener("selectstart", addScore);

// Loop
renderer.setAnimationLoop(() => {
  moveFromHand(c1, last1);
  moveFromHand(c2, last2);
  updatePlayer();
  renderer.render(scene, camera);
});
</script>

</body>
</html>
