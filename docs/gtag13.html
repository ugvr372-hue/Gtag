<!DOCTYPE html>
<html>
  <head>
    <title>VR Dentist Game</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>

  <body>
    <a-scene vr-mode-ui="enabled: true">

      <!-- Camera -->
      <a-entity position="0 1.6 3">
        <a-camera></a-camera>
      </a-entity>

      <!-- VR Hands -->
      <a-entity hand-controls="left"></a-entity>
      <a-entity hand-controls="right"></a-entity>

      <!-- Sky -->
      <a-sky color="#FFE4E1"></a-sky>

      <!-- Patient Head -->
      <a-sphere position="0 1 -2" radius="1.2" color="#FFD1A4"></a-sphere>

      <!-- Mouth -->
      <a-box position="0 0.6 -1.3" width="1.5" height="0.6" depth="0.2" color="black"></a-box>

      <!-- Teeth (Dirty) -->
      <a-box class="tooth" position="-0.5 0.7 -1.2" width="0.3" height="0.4" depth="0.2" color="brown"></a-box>
      <a-box class="tooth" position="0 0.7 -1.2" width="0.3" height="0.4" depth="0.2" color="brown"></a-box>
      <a-box class="tooth" position="0.5 0.7 -1.2" width="0.3" height="0.4" depth="0.2" color="brown"></a-box>

      <!-- UI Text -->
      <a-text id="status"
        value="Clean the teeth! Click them!"
        position="-1.5 2.5 -2"
        color="black"
        width="4">
      </a-text>

    </a-scene>

    <script>
      const teeth = document.querySelectorAll('.tooth');
      const status = document.querySelector('#status');

      let cleaned = 0;

      teeth.forEach(tooth => {
        tooth.addEventListener('click', () => {
          if (tooth.getAttribute('color') === 'brown') {
            tooth.setAttribute('color', 'white');
            cleaned++;

            if (cleaned === teeth.length) {
              status.setAttribute('value', 'All clean! Great dentist 😎');
            } else {
              status.setAttribute('value', cleaned + " cleaned!");
            }
          }
        });
      });
    </script>
  </body>
</html>
