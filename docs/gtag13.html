<!DOCTYPE html>
<html>
<head>
  <title>VR Tengeram MODDED</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #menu {
      position: absolute;
      top: 10px;
      right: 10px;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      font-family: Arial;
      display: none;
    }
  </style>
</head>
<body>

<div id="menu">
  <h3>MOD MENU</h3>
  <p>Fly: <span id="fly">OFF</span></p>
  <p>Speed: <span id="speed">OFF</span></p>
  <p>Super Jump: <span id="jump">OFF</span></p>
  <p>No Friction: <span id="friction">OFF</span></p>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";
import { VRButton } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/webxr/VRButton.js";

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// Camera
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
camera.position.y = 1.6;

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

// Light
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444));

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 200),
  new THREE.MeshStandardMaterial({ color: 0x228B22 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// Forest
for (let i = 0; i < 80; i++) {
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.4, 4),
    new THREE.MeshStandardMaterial({ color: 0x8B4513 })
  );
  trunk.position.set((Math.random()-0.5)*100, 2, (Math.random()-0.5)*100);

  const leaves = new THREE.Mesh(
    new THREE.SphereGeometry(1.5),
    new THREE.MeshStandardMaterial({ color: 0x2E8B57 })
  );
  leaves.position.y = 2.5;
  trunk.add(leaves);
  scene.add(trunk);
}

// Controllers
const c1 = renderer.xr.getController(0);
const c2 = renderer.xr.getController(1);
scene.add(c1);
scene.add(c2);

// =======================
// 🎮 MOD STATES
// =======================
let mods = {
  fly: false,
  speed: false,
  jump: false,
  friction: false
};

// Toggle menu
let menuVisible = false;
const menu = document.getElementById("menu");

c2.addEventListener("selectstart", () => {
  menuVisible = !menuVisible;
  menu.style.display = menuVisible ? "block" : "none";
});

// Toggle mods (left trigger cycles)
c1.addEventListener("selectstart", () => {
  mods.fly = !mods.fly;
  updateMenu();
});

// update UI
function updateMenu() {
  document.getElementById("fly").textContent = mods.fly ? "ON" : "OFF";
  document.getElementById("speed").textContent = mods.speed ? "ON" : "OFF";
  document.getElementById("jump").textContent = mods.jump ? "ON" : "OFF";
  document.getElementById("friction").textContent = mods.friction ? "ON" : "OFF";
}

// =======================
// 🧠 MOVEMENT
// =======================
let velocity = new THREE.Vector3();

function getInput() {
  const session = renderer.xr.getSession();
  if (!session) return;

  session.inputSources.forEach(src => {
    if (src.gamepad && src.handedness === "left") {

      const axes = src.gamepad.axes;
      let x = axes[0] || axes[2] || 0;
      let y = axes[1] || axes[3] || 0;

      const camDir = new THREE.Vector3();
      camera.getWorldDirection(camDir);
      camDir.y = 0;
      camDir.normalize();

      const right = new THREE.Vector3();
      right.crossVectors(camDir, new THREE.Vector3(0,1,0));

      let moveSpeed = mods.speed ? 0.2 : 0.08;

      // 🛸 FLY MODE (no vertical movement)
      if (mods.fly) {
        camera.position.add(camDir.multiplyScalar(-y * moveSpeed));
        camera.position.add(right.multiplyScalar(x * moveSpeed));
        return;
      }

      velocity.add(camDir.multiplyScalar(-y * moveSpeed));
      velocity.add(right.multiplyScalar(x * moveSpeed));
    }
  });
}

// Hand boost
let last = new THREE.Vector3();

function handBoost() {
  const pos = new THREE.Vector3();
  c1.getWorldPosition(pos);

  if (last.lengthSq() === 0) {
    last.copy(pos);
    return;
  }

  const delta = pos.clone().sub(last);

  if (delta.y < -0.02) {
    velocity.y += mods.jump ? 0.4 : 0.2;
  }

  last.copy(pos);
}

// Update player
function updatePlayer() {

  if (!mods.fly) {
    camera.position.add(velocity);

    velocity.y -= 0.025;

    if (!mods.friction) {
      velocity.multiplyScalar(0.92);
    }

    if (camera.position.y < 1.6) {
      camera.position.y = 1.6;
      velocity.y = 0;
    }
  }
}

// Loop
renderer.setAnimationLoop(() => {
  getInput();
  handBoost();
  updatePlayer();
  renderer.render(scene, camera);
});
</script>

</body>
</html>
