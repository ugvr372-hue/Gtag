<!DOCTYPE html>
<html>
  <head>
    <title>COD VR Standalone</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene physics="debug: false; gravity: -9.8">
      
      <a-assets>
        <a-asset-item id="gun-model" src="path_to_gun.glb"></a-asset-item>
      </a-assets>

      <a-entity environment="preset: egypt; dressingAmount: 50"></a-entity>

      <a-entity id="player" movement-controls="controls: checkpoint, gamepad">
        <a-entity camera position="0 1.6 0" look-controls></a-entity>
        
        <a-entity oculus-touch-controls="hand: left" 
                  thumbstick-logging 
                  @thumbstickdown="toggleSprint"></a-entity>

        <a-entity oculus-touch-controls="hand: right" 
                  triggerdown="shootWeapon"
                  thumbstickdown="toggleCrouch"></a-entity>
        
        <a-box id="holster" static-body 
               position="0 0.8 -0.2" 
               opacity="0.1" width="0.3" height="0.1" depth="0.3">
          <a-entity id="weapon" gltf-model="#gun-model" scale="0.1 0.1 0.1"></a-entity>
        </a-box>
      </a-entity>

    </a-scene>

    <script>
      // Simple Money Logic
      let score = 0;
      let money = 0;

      // Logic for killing a zombie
      function onZombieKilled() {
        money += 5;
        console.log("Current Money: $" + money);
      }

      // Logic for buying from crate
      function buyWeapon() {
        if (money >= 10) {
          money -= 10;
          // Trigger weapon spawn logic
        }
      }
    </script>
  </body>
</html>
