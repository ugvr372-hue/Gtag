<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>VR Prison Escape</title>
    <meta name="description" content="13+ VR Prison Escape Game" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.1/dist/aframe-physics-system.min.js"></script>
  </head>
  <body>
    <a-scene physics="debug: false" vr-mode-ui="enabled: true">
      <!-- Sky and lighting -->
      <a-sky color="#222"></a-sky>
      <a-entity light="type: ambient; intensity: 0.5"></a-entity>
      <a-entity light="type: directional; intensity: 0.6; castShadow: true" position="5 10 5"></a-entity>

      <!-- Prison environment -->
      <a-box position="0 0 -5" depth="20" height="4" width="0.2" color="#888"></a-box> <!-- left wall -->
      <a-box position="0 0 5" depth="20" height="4" width="0.2" color="#888"></a-box> <!-- right wall -->
      <a-box position="5 0 0" depth="0.2" height="4" width="10" color="#888"></a-box> <!-- back wall -->
      <a-box position="-5 0 0" depth="0.2" height="4" width="10" color="#888"></a-box> <!-- front wall -->
      <a-box position="0 -2 0" depth="10" height="0.2" width="20" color="#444"></a-box> <!-- floor -->

      <!-- Wall to dig -->
      <a-box id="diggableWall" position="0 0 -2" depth="0.2" height="2" width="4" color="#aaa" class="interactable"></a-box>

      <!-- Painting to hide hole -->
      <a-box id="painting" position="0 0 -2.05" depth="0.1" height="1.5" width="2" color="#f4a" class="interactable"></a-box>

      <!-- Spoon for digging/attack -->
      <a-box id="spoon" position="2 0 -3" depth="0.1" height="0.1" width="0.5" color="#ccc" class="interactable" grabbable></a-box>

      <!-- Player rig -->
      <a-entity id="rig" position="0 1.6 3">
        <a-camera wasd-controls look-controls></a-camera>
        <a-entity hand-controls="hand: left" physics-body></a-entity>
        <a-entity hand-controls="hand: right" physics-body></a-entity>
      </a-entity>

      <!-- Security Guard -->
      <a-box id="guard" position="-2 0 -2" depth="0.5" height="1.8" width="0.5" color="#f00"></a-box>

      <!-- NPC Prisoners -->
      <a-box class="npc" position="1 0 -1" depth="0.5" height="1.6" width="0.5" color="#00f"></a-box>
      <a-box class="npc" position="-1 0 -3" depth="0.5" height="1.6" width="0.5" color="#00f"></a-box>

      <!-- Blood particles -->
      <a-entity id="blood" particle-system="preset: dust; color: red; particleCount: 0;"></a-entity>

      <script>
        // Digging mechanics
        const wall = document.querySelector("#diggableWall");
        const spoon = document.querySelector("#spoon");
        let digProgress = 0;

        spoon.addEventListener('click', () => {
          digProgress += 0.1;
          document.querySelector("#blood").setAttribute('particle-system', 'particleCount', digProgress*50);
          wall.setAttribute('color', `rgb(${170-digProgress*100}, ${170-digProgress*100}, ${170-digProgress*100})`);
          if(digProgress >= 1){
            console.log("Hole fully dug! Cover with painting!");
          }
        });

        // Guard AI
        const guard = document.querySelector("#guard");
        let guardPatrol = true;
        setInterval(() => {
          if(guardPatrol){
            guard.setAttribute("position", {x: -2, y:0, z: -2});
            setTimeout(() => { 
              // Detect player if digging and painting not covering
              const painting = document.querySelector("#painting");
              if(digProgress > 0.3 && painting.getAttribute("position").z < -2){
                alert("Caught! Game restarting…");
                window.location.reload();
              }
            }, 5000);
          }
        }, 30000);

        // NPC movement
        const npcs = document.querySelectorAll(".npc");
        npcs.forEach(npc => {
          let direction = 1;
          setInterval(() => {
            let pos = npc.getAttribute("position");
            if(pos.x > 4) direction = -1;
            if(pos.x < -4) direction = 1;
            npc.setAttribute("position", {x: pos.x + 0.1*direction, y: pos.y, z: pos.z});
          }, 100);
        });

        // Ragdoll death on click
        npcs.forEach(npc => {
          npc.addEventListener('click', () => {
            npc.setAttribute("dynamic-body", "mass:1");
            npc.setAttribute("color", "#800"); // blood color
          });
        });

        // Grabbing painting
        const painting = document.querySelector("#painting");
        painting.setAttribute("grabbable", "");
      </script>
    </a-scene>
  </body>
</html>
