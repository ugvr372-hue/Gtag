<!DOCTYPE html>
<html>
  <head>
    <title>DinoVR: Black Ops Realistic (Fixed)</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene loading-screen="enabled: false" renderer="antialias: true; colorManagement: true;">
      
      <a-assets></a-assets>

      <a-entity id="main-menu" position="0 1.5 -2">
        <a-text value="SELECT MAP & DIFFICULTY" align="center" position="0 1 0" color="yellow"></a-text>
        <a-entity id="map-group" position="0 0.5 0">
            <a-box id="btn-desert" position="-0.4 0 0" width="0.3" height="0.15" color="#edc9af" class="clickable"><a-text value="DESERT" align="center" scale="0.2 0.2 0.2" position="0 0 0.06"></a-text></a-box>
            <a-box id="btn-city" position="0.4 0 0" width="0.3" height="0.15" color="#555" class="clickable"><a-text value="CITY" align="center" scale="0.2 0.2 0.2" position="0 0 0.06"></a-text></a-box>
        </a-entity>
        <a-text value="CLICK TO CALIBRATE & START" position="0 -0.5 0" align="center" scale="0.5 0.5 0.5" color="white"></a-text>
      </a-entity>

      <a-entity id="world" environment="preset: egypt; dressingAmount: 20"></a-entity>

      <a-entity id="rig" movement-controls="controls: gamepad; speed: 0;">
        <a-entity id="camera" camera position="0 1.6 0" look-controls>
            <a-cursor fuse="false" raycaster="objects: .clickable"></a-cursor>
            <a-text id="money-ui" value="$0" position="0.5 0.5 -1" color="green"></a-text>
        </a-entity>

        <a-entity id="rightHand" oculus-touch-controls="hand: right" gun-shoot-logic raycaster="objects: .zombie; far: 50">
            <a-entity id="gun-model" position="0 -0.05 -0.1">
                <a-box width="0.035" height="0.05" depth="0.22" color="#222"></a-box> <a-box width="0.032" height="0.11" depth="0.045" color="#1a1a1a" position="0 -0.06 0.05" rotation="-15 0 0"></a-box> <a-circle radius="0.008" color="black" position="0 0 -0.111" rotation="0 180 0"></a-circle> </a-entity>
        </a-entity>

        <a-entity id="leftHand" oculus-touch-controls="hand: left"></a-entity>
      </a-entity>
    </a-scene>

    <script>
      let userHeight = 1.6;
      let selectedMap = false;

      // 1. HEIGHT CALIBRATOR & START
      document.querySelectorAll('.clickable').forEach(btn => {
          btn.addEventListener('click', () => {
              // Calibrate height based on where your headset is RIGHT NOW
              const cam = document.querySelector('#camera');
              userHeight = cam.getAttribute('position').y;
              
              document.querySelector('#rig').setAttribute('movement-controls', 'speed: 0.2');
              document.querySelector('#main-menu').setAttribute('visible', 'false');
              selectedMap = true;
              startSpawning();
              console.log("Height Calibrated to: " + userHeight);
          });
      });

      // 2. GUN & CROUCH LOGIC
      AFRAME.registerComponent('gun-shoot-logic', {
        init: function () {
          // INFINITE AMMO SHOOT
          this.el.addEventListener('triggerdown', () => {
            const ray = this.el.components.raycaster;
            const hit = ray.getIntersection(document.querySelector('.zombie'));
            
            if (hit) {
              hit.el.emit('die');
              // Update money logic here
            }
          });

          // CROUCH (Toggle based on calibrated height)
          this.el.addEventListener('thumbstickdown', () => {
            const cam = document.querySelector('#camera');
            let currentY = cam.getAttribute('position').y;
            // If standing, go to half height. If crouching, go back to calibrated height.
            cam.setAttribute('position', {x: 0, y: currentY > (userHeight * 0.7) ? userHeight / 2 : userHeight, z: 0});
          });
        }
      });

      // ZOMBIE AI (With simple staggering)
      AFRAME.registerComponent('zombie-ai', {
        init: function () {
          this.el.classList.add('zombie');
          this.el.addEventListener('die', () => this.el.parentNode.removeChild(this.el));
          this.el.setAttribute('animation', {property: 'rotation', from: '-5 0 -5', to: '5 0 5', dur: 1000, dir: 'alternate', loop: true});
        },
        tick: function () {
          if (!selectedMap) return;
          let playerPos = new THREE.Vector3();
          document.querySelector('#camera').object3D.getWorldPosition(playerPos);
          this.el.object3D.lookAt(playerPos.x, 0, playerPos.z);
          let dir = new THREE.Vector3().subVectors(playerPos, this.el.object3D.position).normalize();
          this.el.object3D.position.addScaledVector(dir, 0.02);
        }
      });

      function spawnZombie() {
        if (!selectedMap) return;
        const z = document.createElement('a-entity');
        z.setAttribute('position', `${(Math.random()-0.5)*20} 0 -15`);
        z.setAttribute('zombie-ai', '');
        z.innerHTML = `<a-box width="0.5" height="1.8" depth="0.2" color="green"></a-box>`;
        document.querySelector('a-scene').appendChild(z);
      }

      function startSpawning() { setInterval(spawnZombie, 3000); }
    </script>
  </body>
</html>
