<!DOCTYPE html>
<html>
<head>
  <title>VR Tengeram MODDED HANDS</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #menu {
      position: absolute;
      top: 10px;
      right: 10px;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      font-family: Arial;
      display: none;
      z-index: 100;
    }
  </style>
</head>
<body>

<div id="menu">
  <h3>MOD MENU</h3>
  <p>Fly: <span id="fly">OFF</span></p>
  <p>Speed: <span id="speed">OFF</span></p>
  <p>Super Jump: <span id="jump">OFF</span></p>
  <p>No Friction: <span id="friction">OFF</span></p>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";
import { VRButton } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/webxr/VRButton.js";
import { XRHandModelFactory } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/webxr/XRHandModelFactory.js";

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// Camera
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
camera.position.y = 1.6;

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

// Light
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444));

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 200),
  new THREE.MeshStandardMaterial({ color: 0x228B22 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// Forest
for (let i = 0; i < 80; i++) {
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.4, 4),
    new THREE.MeshStandardMaterial({ color: 0x8B4513 })
  );
  trunk.position.set((Math.random()-0.5)*100, 2, (Math.random()-0.5)*100);

  const leaves = new THREE.Mesh(
    new THREE.SphereGeometry(1.5),
    new THREE.MeshStandardMaterial({ color: 0x2E8B57 })
  );
  leaves.position.y = 2.5;
  trunk.add(leaves);
  scene.add(trunk);
}

// =======================
// 🖐️ CONTROLLERS & HANDS
// =======================
const controller1 = renderer.xr.getController(0);
const controller2 = renderer.xr.getController(1);
scene.add(controller1);
scene.add(controller2);

// Hand models
const handFactory = new XRHandModelFactory();
const hand1 = renderer.xr.getHand(0);
const hand2 = renderer.xr.getHand(1);
hand1.add(handFactory.createHandModel(hand1, "mesh"));
hand2.add(handFactory.createHandModel(hand2, "mesh"));
scene.add(hand1);
scene.add(hand2);

// =======================
// 🎮 MODS
// =======================
let mods = { fly: false, speed: false, jump: false, friction: false };

// Toggle menu with X button
let menuVisible = false;
const menu = document.getElementById("menu");

// Input loop
function handleControllerGamepad() {
  const session = renderer.xr.getSession();
  if (!session) return;

  session.inputSources.forEach(src => {
    if (src.gamepad) {
      // X button index (usually 3 for left controller)
      if (src.handedness === "right") {
        if (src.gamepad.buttons[3]?.pressed) {
          menuVisible = !menuVisible;
          menu.style.display = menuVisible ? "block" : "none";
        }
      }

      // Toggle fly with left trigger (button 0)
      if (src.handedness === "left" && src.gamepad.buttons[0]?.pressed) {
        mods.fly = !mods.fly;
        updateMenu();
      }
    }
  });
}

function updateMenu() {
  document.getElementById("fly").textContent = mods.fly ? "ON" : "OFF";
  document.getElementById("speed").textContent = mods.speed ? "ON" : "OFF";
  document.getElementById("jump").textContent = mods.jump ? "ON" : "OFF";
  document.getElementById("friction").textContent = mods.friction ? "ON" : "OFF";
}

// =======================
// 🧠 MOVEMENT
// =======================
let velocity = new THREE.Vector3();
let lastHandPos = new THREE.Vector3();

function getInput() {
  const session = renderer.xr.getSession();
  if (!session) return;

  session.inputSources.forEach(src => {
    if (src.gamepad && src.handedness === "left") {
      let axes = src.gamepad.axes;
      let x = axes[0] || axes[2] || 0;
      let y = axes[1] || axes[3] || 0;

      const dead = 0.1;
      if (Math.abs(x) < dead) x = 0;
      if (Math.abs(y) < dead) y = 0;

      const camDir = new THREE.Vector3();
      camera.getWorldDirection(camDir);
      camDir.y = 0;
      camDir.normalize();
      const right = new THREE.Vector3();
      right.crossVectors(camDir, new THREE.Vector3(0,1,0));

      const moveSpeed = mods.speed ? 0.2 : 0.08;

      if (mods.fly) {
        camera.position.add(camDir.multiplyScalar(-y*moveSpeed));
        camera.position.add(right.multiplyScalar(x*moveSpeed));
        return;
      }

      velocity.add(camDir.multiplyScalar(-y*moveSpeed));
      velocity.add(right.multiplyScalar(x*moveSpeed));
    }
  });
}

// Hand boost
function handBoost() {
  const pos = new THREE.Vector3();
  controller1.getWorldPosition(pos);
  if (lastHandPos.lengthSq() === 0) {
    lastHandPos.copy(pos); return;
  }
  const delta = pos.clone().sub(lastHandPos);
  if (delta.y < -0.02) velocity.y += mods.jump ? 0.4 : 0.2;
  lastHandPos.copy(pos);
}

// Player update
function updatePlayer() {
  if (!mods.fly) {
    camera.position.add(velocity);
    velocity.y -= 0.025;
    if (!mods.friction) velocity.multiplyScalar(0.92);
    if (camera.position.y < 1.6) {
      camera.position.y = 1.6;
      velocity.y = 0;
    }
  }
}

// =======================
// 🔁 LOOP
// =======================
renderer.setAnimationLoop(() => {
  handleControllerGamepad();
  getInput();
  handBoost();
  updatePlayer();
  renderer.render(scene, camera);
});
</script>
</body>
</html>
