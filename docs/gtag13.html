<!DOCTYPE html>
<html>
<head>
    <title>Gemini VR Fun House</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
</head>
<body>

    <a-scene xr-mode-ui="enabled: true">
        <a-assets>
            <img id="moneyTex" src="https://img.icons8.com/color/480/money-bag.png">
        </a-assets>

        <a-entity environment="preset: forest; dressingAmount: 50"></a-entity>

        <a-entity id="rig" position="0 0 4">
            <a-camera>
                <a-cursor color="#FF0000"></a-cursor>
            </a-camera>
            <a-entity oculus-touch-controls="hand: left"></a-entity>
            <a-entity oculus-touch-controls="hand: right"></a-entity>
        </a-entity>

        <a-entity id="game-ui" position="0 2 0">
            <a-plane color="#2ecc71" width="4" height="1" position="0 1 -2">
                <a-text id="balance" value="Balance: $1,000,000" align="center" color="#FFF" width="10"></a-text>
            </a-plane>

            <a-entity position="-1.5 0 -2" class="clickable" onclick="buy(5, 'Burger')">
                <a-box color="#f1c40f" depth="0.5" height="0.5" width="0.5">
                    <a-animation attribute="rotation" dur="3000" to="0 360 0" repeat="indefinite"></a-animation>
                </a-box>
                <a-text value="Burger ($5)" align="center" position="0 -0.6 0" width="3"></a-text>
            </a-entity>

            <a-entity position="0 0 -2" class="clickable" onclick="buy(50000, 'Gold Bar')">
                <a-box color="#FFD700" depth="0.8" height="0.2" width="0.4"></a-box>
                <a-text value="Gold ($50k)" align="center" position="0 -0.6 0" width="3"></a-text>
            </a-entity>

            <a-entity position="1.5 0 -2" class="clickable" onclick="buy(1000000, 'Rocket')">
                <a-cylinder color="#e74c3c" radius="0.2" height="1"></a-cylinder>
                <a-text value="Rocket ($1M)" align="center" position="0 -0.6 0" width="3"></a-text>
            </a-entity>
        </a-entity>

        <a-entity id="ar-message" position="0 1 -1" visible="false">
            <a-text value="You are in AR Mode!\nLook at your desk." align="center" color="black"></a-text>
        </a-entity>

    </a-scene>

    <script>
        let balance = 1000000;
        const balanceText = document.querySelector('#balance');

        function buy(price, name) {
            if (balance >= price) {
                balance -= price;
                balanceText.setAttribute('value', 'Balance: $' + balance.toLocaleString());
                
                // Visual Feedback: Create a floating money icon
                const scene = document.querySelector('a-scene');
                const feedback = document.createElement('a-text');
                feedback.setAttribute('value', '-' + name);
                feedback.setAttribute('position', '0 2.5 -2');
                feedback.setAttribute('color', 'red');
                feedback.setAttribute('align', 'center');
                scene.appendChild(feedback);

                // Make feedback float up and disappear
                setTimeout(() => {
                    scene.removeChild(feedback);
                }, 1000);
            } else {
                balanceText.setAttribute('value', 'NOT ENOUGH CASH!');
                setTimeout(() => {
                    balanceText.setAttribute('value', 'Balance: $' + balance.toLocaleString());
                }, 1000);
            }
        }

        // Detect AR Mode
        document.querySelector('a-scene').addEventListener('enter-vr', function () {
           if (this.is('ar-mode')) {
               document.querySelector('#ar-message').setAttribute('visible', 'true');
           }
        });
    </script>
</body>
</html>
