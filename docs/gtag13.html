<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Locked-In VR Prison Escape</title>
  <meta name="description" content="13+ VR Prison Escape Game">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.1/dist/aframe-physics-system.min.js"></script>
</head>
<body>
  <a-scene physics="gravity:-9.8" vr-mode-ui="enabled:true" background="color:#222" loading-screen="enabled:false">
    <!-- Lights -->
    <a-entity light="type: ambient; intensity: 0.5"></a-entity>
    <a-entity light="type: directional; intensity: 0.6; castShadow:true" position="5 10 5"></a-entity>

    <!-- Player Rig with joystick movement -->
    <a-entity id="rig" position="0 1.6 5" movement-controls="speed:0.1" physics-body="shape:capsule; mass:80">
      <a-camera wasd-controls look-controls></a-camera>
      <a-entity hand-controls="hand: left" physics-body></a-entity>
      <a-entity hand-controls="hand: right" physics-body></a-entity>
    </a-entity>

    <!-- Prison environment -->
    <a-box position="0 -2 0" depth="20" height="0.2" width="20" color="#444" static-body></a-box>
    <a-box position="0 0 -10" depth="0.2" height="4" width="20" color="#888" static-body></a-box>
    <a-box position="0 0 10" depth="0.2" height="4" width="20" color="#888" static-body></a-box>
    <a-box position="-10 0 0" depth="20" height="4" width="0.2" color="#888" static-body></a-box>
    <a-box position="10 0 0" depth="20" height="4" width="0.2" color="#888" static-body></a-box>

    <!-- Diggable Wall -->
    <a-box id="diggableWall" position="0 0 -5" depth="0.2" height="2" width="4" color="#aaa"></a-box>

    <!-- Painting -->
    <a-box id="painting" position="0 0 -5.05" depth="0.1" height="1.5" width="2" color="#f4a" grabbable></a-box>

    <!-- Spoon -->
    <a-box id="spoon" position="2 0 -3" depth="0.1" height="0.1" width="0.5" color="#ccc" grabbable></a-box>

    <!-- Security Guard -->
    <a-box id="guard" position="-2 0 -2" depth="0.5" height="1.8" width="0.5" color="#f00" dynamic-body></a-box>

    <!-- NPC Prisoners -->
    <a-box class="npc" position="1 0 -1" depth="0.5" height="1.6" width="0.5" color="#00f" dynamic-body></a-box>
    <a-box class="npc" position="-1 0 -3" depth="0.5" height="1.6" width="0.5" color="#00f" dynamic-body></a-box>

    <!-- Blood particles -->
    <a-entity id="blood" particle-system="preset:dust; color:red; particleCount:0;"></a-entity>

    <script>
      AFRAME.registerComponent('dig-spoon', {
        init: function(){
          const wall = document.querySelector("#diggableWall");
          const blood = document.querySelector("#blood");
          let digProgress = 0;
          this.el.addEventListener('click', () => {
            digProgress += 0.1;
            blood.setAttribute('particle-system','particleCount',digProgress*50);
            wall.setAttribute('color',`rgb(${170-digProgress*100},${170-digProgress*100},${170-digProgress*100})`);
            if(digProgress>=1){
              console.log("Hole dug! Cover with painting!");
            }
          });
        }
      });

      // Attach dig component to spoon
      document.querySelector("#spoon").setAttribute('dig-spoon','');

      // Guard AI
      const guard = document.querySelector("#guard");
      const painting = document.querySelector("#painting");
      let diggableWall = document.querySelector("#diggableWall");
      let invincible = false;
      let guardsFrozen = false;

      setInterval(()=>{
        if(!guardsFrozen){
          guard.setAttribute("position",{x:-2,y:0,z:-5});
          setTimeout(()=>{
            if(diggableWall && diggableWall.getAttribute('color')!="#aaa"){
              if(painting.getAttribute("position").z < -5 && !invincible){
                alert("Caught! Restarting scene...");
                window.location.reload();
              }
            }
          },5000);
        }
      },30000);

      // NPC AI
      const npcs = document.querySelectorAll(".npc");
      npcs.forEach(npc=>{
        let dir = 1;
        setInterval(()=>{
          let pos = npc.getAttribute("position");
          if(pos.x>4) dir=-1;
          if(pos.x<-4) dir=1;
          npc.setAttribute("position",{x:pos.x+0.05*dir, y:pos.y, z:pos.z});
        },100);
        npc.addEventListener('click',()=>{
          npc.setAttribute("dynamic-body","mass:1");
          npc.setAttribute("color","#800");
        });
      });
    </script>
  </a-scene>
</body>
</html>
