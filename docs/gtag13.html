<!DOCTYPE html>
<html>
  <head>
    <title>Monke Sandbox - Pro Platforms</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/n5ro/aframe-physics-system@v4.0.1/dist/aframe-physics-system.min.js"></script>
  </head>
  <body>
    <a-scene physics="debug: false; gravity: -9.8; iterations: 30">
      
      <a-assets>
        <a-asset-item id="hand-l" src="https://vazxmixjsiawhamurptx.supabase.co/storage/v1/object/public/models/hand-left/model.gltf"></a-asset-item>
        <a-asset-item id="hand-r" src="https://vazxmixjsiawhamurptx.supabase.co/storage/v1/object/public/models/hand-right/model.gltf"></a-asset-item>
      </a-assets>

      <a-entity environment="preset: osiris; ground: hills; dressingAmount: 30"></a-entity>
      <a-plane static-body position="0 0 0" rotation="-90 0 0" width="100" height="100" visible="false"></a-plane>

      <a-entity id="rig" movement-controls="fly: false; speed: 0" dynamic-body="shape: sphere; sphereRadius: 0.3; mass: 5">
        <a-entity camera id="head" position="0 0.6 0" look-controls>
            <a-box color="#222" scale="0.2 0.1 0.15" position="0 0 -0.05"></a-box>
            <a-sphere color="#5a3d2b" radius="0.3" position="0 -0.3 0" visible="false"></a-sphere>
        </a-camera>
        
        <a-entity id="left-hand" oculus-touch-controls="hand: left">
            <a-gltf-model src="#hand-l" scale="1.5 1.5 1.5" static-body="shape: box"></a-gltf-model>
            <a-box id="plat-l" visible="false" static-body position="0 -0.1 0" scale="0.5 0.05 0.5" color="#555" opacity="0.7"></a-box>
            
            <a-entity id="mod-menu" position="0 0.1 0.05" rotation="-90 0 0" visible="false">
                <a-plane color="#000" height="0.4" width="0.25">
                    <a-text value="MONKE MODS" align="center" position="0 0.15 0.01" scale="0.1 0.1 0.1"></a-text>
                    <a-plane class="menu-btn" color="blue" position="0 0.05 0.02" width="0.2" height="0.05" onclick="spawnEntity('huggy')"><a-text value="Spawn Huggy" align="center" scale="0.08 0.08 0.08"></a-text></a-plane>
                    <a-plane class="menu-btn" color="green" position="0 -0.05 0.02" width="0.2" height="0.05" onclick="toggleFly()"><a-text id="fly-txt" value="Fly: OFF" align="center" scale="0.08 0.08 0.08"></a-text></a-plane>
                </a-plane>
            </a-entity>
        </a-entity>

        <a-entity id="right-hand" oculus-touch-controls="hand: right" laser-controls="hand: right" raycaster="objects: .menu-btn; far: 5">
            <a-gltf-model src="#hand-r" scale="1.5 1.5 1.5" static-body="shape: box"></a-gltf-model>
            <a-box id="plat-r" visible="false" static-body position="0 -0.1 0" scale="0.5 0.05 0.5" color="#555" opacity="0.7"></a-box>
        </a-entity>
      </a-entity>

      <a-entity id="world"></a-entity>

    </a-scene>

    <script>
      let isFlying = false;

      // Menu Toggle (X)
      document.querySelector('#left-hand').addEventListener('xbuttondown', () => {
          const m = document.querySelector('#mod-menu');
          m.setAttribute('visible', !m.getAttribute('visible'));
      });

      // REAL G-TAG PLATFORMS (Hold Grip)
      function setupPlat(handID, platID) {
          const hand = document.querySelector(handID);
          const plat = document.querySelector(platID);

          hand.addEventListener('gripdown', () => {
              plat.setAttribute('visible', true);
              // Teleport platform to current hand position
              const handPos = hand.object3D.getWorldPosition(new THREE.Vector3());
              plat.setAttribute('position', {x: 0, y: -0.1, z: 0}); 
              plat.setAttribute('static-body', ''); // Reset physics
          });

          hand.addEventListener('gripup', () => {
              plat.setAttribute('visible', false);
              plat.removeAttribute('static-body'); // Remove collision when not in use
          });
      }

      setupPlat('#left-hand', '#plat-l');
      setupPlat('#right-hand', '#plat-r');

      function toggleFly() {
          isFlying = !isFlying;
          const rig = document.querySelector('#rig');
          rig.setAttribute('movement-controls', isFlying ? 'fly: true; speed: 0.3' : 'fly: false; speed: 0');
          rig.body.mass = isFlying ? 0 : 5;
          document.querySelector('#fly-txt').setAttribute('value', `Fly: ${isFlying ? 'ON' : 'OFF'}`);
      }

      // Physics Pushing (Slapping the ground)
      document.querySelectorAll('#left-hand, #right-hand').forEach(hand => {
          hand.addEventListener('collide', (e) => {
              if (!isFlying) {
                  const rig = document.querySelector('#rig');
                  rig.body.applyImpulse(new CANNON.Vec3(0, 7, 0), rig.body.position);
              }
          });
      });

      function spawnEntity(type) {
          const m = document.createElement('a-entity');
          m.setAttribute('position', {x: (Math.random()-0.5)*5, y: 2, z: -3});
          m.innerHTML = `<a-box color="blue" scale="0.4 1 0.3" dynamic-body="mass:1"></a-box>
                         <a-sphere color="blue" position="0 0.8 0" radius="0.25" dynamic-body="mass:0.5"></a-sphere>`;
          document.querySelector('#world').appendChild(m);
      }
    </script>
  </body>
</html>
