<!DOCTYPE html>
<html>
<head>
  <title>VR Tengeram</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #leaderboard {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 10px;
      font-family: Arial;
    }
  </style>
</head>
<body>

<div id="leaderboard">
  <h3>Leaderboard</h3>
  <ol id="scores"></ol>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";
import { VRButton } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/webxr/VRButton.js";

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// Camera
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
camera.position.y = 1.6;

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

// Light
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444));

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 200),
  new THREE.MeshStandardMaterial({ color: 0x228B22 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// 🌲 Forest
for (let i = 0; i < 100; i++) {
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.4, 4),
    new THREE.MeshStandardMaterial({ color: 0x8B4513 })
  );

  trunk.position.set(
    (Math.random() - 0.5) * 100,
    2,
    (Math.random() - 0.5) * 100
  );

  const leaves = new THREE.Mesh(
    new THREE.SphereGeometry(1.5),
    new THREE.MeshStandardMaterial({ color: 0x2E8B57 })
  );

  leaves.position.y = 2.5;
  trunk.add(leaves);
  scene.add(trunk);
}

// Controllers
const c1 = renderer.xr.getController(0);
const c2 = renderer.xr.getController(1);
scene.add(c1);
scene.add(c2);

// =======================
// 🧠 MOVEMENT SYSTEM
// =======================
let velocity = new THREE.Vector3();
let speed = 0.08;

// 🔥 AUTO-DETECT JOYSTICK
function getInput() {
  const session = renderer.xr.getSession();
  if (!session) return;

  session.inputSources.forEach(src => {
    if (src.gamepad && src.handedness === "left") {

      const axes = src.gamepad.axes;

      let x = 0;
      let y = 0;

      // auto detect which axes are active
      if (axes.length >= 2) {
        if (Math.abs(axes[0]) > 0.01 || Math.abs(axes[1]) > 0.01) {
          x = axes[0];
          y = axes[1];
        } else if (axes.length >= 4) {
          x = axes[2];
          y = axes[3];
        }
      }

      // deadzone
      const dead = 0.1;
      if (Math.abs(x) < dead) x = 0;
      if (Math.abs(y) < dead) y = 0;

      const camDir = new THREE.Vector3();
      camera.getWorldDirection(camDir);
      camDir.y = 0;
      camDir.normalize();

      const right = new THREE.Vector3();
      right.crossVectors(camDir, new THREE.Vector3(0,1,0));

      velocity.add(camDir.multiplyScalar(-y * speed));
      velocity.add(right.multiplyScalar(x * speed));
    }
  });
}

// 🖐️ Hand boost
let last1 = new THREE.Vector3();
let last2 = new THREE.Vector3();

function handBoost(controller, last) {
  const pos = new THREE.Vector3();
  controller.getWorldPosition(pos);

  if (last.lengthSq() === 0) {
    last.copy(pos);
    return;
  }

  const delta = pos.clone().sub(last);

  if (delta.y < -0.02) {
    velocity.y += -delta.y * 0.2;
  }

  last.copy(pos);
}

// 🧱 Tree collision
function collideTrees() {
  scene.children.forEach(obj => {
    if (obj.geometry && obj.geometry.type === "CylinderGeometry") {
      const dx = camera.position.x - obj.position.x;
      const dz = camera.position.z - obj.position.z;
      const dist = Math.sqrt(dx*dx + dz*dz);

      if (dist < 1) {
        velocity.x += dx * 0.05;
        velocity.z += dz * 0.05;
      }
    }
  });
}

// Player update
function updatePlayer() {
  camera.position.add(velocity);

  velocity.y -= 0.025; // gravity
  velocity.multiplyScalar(0.92); // friction

  if (camera.position.y < 1.6) {
    camera.position.y = 1.6;
    velocity.y = 0;
  }

  collideTrees();
}

// =======================
// 🏆 LEADERBOARD
// =======================
let scores = JSON.parse(localStorage.getItem("vr_scores") || "[]");

function addScore() {
  const score = Math.floor(Math.random() * 100);
  scores.push(score);
  scores.sort((a,b)=>b-a);
  scores = scores.slice(0,5);
  localStorage.setItem("vr_scores", JSON.stringify(scores));
  renderScores();
}

function renderScores() {
  const list = document.getElementById("scores");
  list.innerHTML = "";
  scores.forEach(s => {
    const li = document.createElement("li");
    li.textContent = s;
    list.appendChild(li);
  });
}

renderScores();

// trigger = add score
c1.addEventListener("selectstart", addScore);

// =======================
// 🔁 LOOP
// =======================
renderer.setAnimationLoop(() => {
  getInput();
  handBoost(c1, last1);
  handBoost(c2, last2);
  updatePlayer();
  renderer.render(scene, camera);
});
</script>

</body>
</html>
