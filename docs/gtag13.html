<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>BEYOND | INSTANT BOOT</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/n5ro/aframe-physics-system@v4.0.1/dist/aframe-physics-system.min.js"></script>
  </head>
  <body>
    <a-scene 
      loading-screen="enabled: false" 
      physics="driver: local; gravity: -9.8; iterations: 20">
      
      <a-assets>
        </a-assets>

      <a-sky color="#050505"></a-sky>
      <a-light type="ambient" intensity="0.5"></a-light>
      <a-light type="point" position="2 5 -2" intensity="0.8" color="red"></a-light>
      
      <a-box static-body position="0 -0.5 0" width="100" height="1" depth="100" color="#111"></a-box>

      <a-entity id="rig" movement-controls="speed: 0.2" kinematic-body>
        <a-entity camera id="head" position="0 1.6 0" look-controls>
            <a-text value="BEYOND v1.0" color="red" scale="0.1 0.1 0.1" position="0 0.1 -0.5" align="center"></a-text>
        </a-entity>

        <a-entity id="left-hand" oculus-touch-controls="hand: left">
            <a-entity id="menu" visible="false" position="0 0.2 0" rotation="-45 0 0">
                <a-plane color="#000" height="0.4" width="0.3" opacity="0.9">
                    <a-plane class="btn" color="#333" position="0 0 0.01" width="0.25" height="0.1" onclick="spawnTarget()">
                        <a-text value="SPAWN NPC" align="center" scale="0.1 0.1 0.1"></a-text>
                    </a-plane>
                </a-plane>
            </a-entity>
        </a-entity>

        <a-entity id="right-hand" oculus-touch-controls="hand: right" laser-controls="hand: right" raycaster="objects: .btn, .target; far: 50">
            <a-entity id="gun" position="0 0 -0.1">
                <a-box color="#111" scale="0.03 0.05 0.2"></a-box> <a-box color="#111" scale="0.03 0.1 0.04" position="0 -0.05 0.06" rotation="15 0 0"></a-box> </a-entity>
        </a-entity>
      </a-entity>

      <a-entity id="world"></a-entity>

    </a-scene>

    <script>
      // 1. NPC Spawner
      window.spawnTarget = function() {
          const e = document.createElement('a-entity');
          e.setAttribute('position', {x: 0, y: 1.5, z: -5});
          e.innerHTML = `
            <a-box class="target" color="#444" scale="0.5 1.5 0.3" dynamic-body="mass: 10"></a-box>
            <a-sphere class="target" color="#d2b48c" position="0 1 0" radius="0.25" dynamic-body="mass: 2"></a-sphere>
          `;
          document.querySelector('#world').appendChild(e);
      };

      // 2. Shooting & Beyond Physics
      document.querySelector('#right-hand').addEventListener('triggerdown', function() {
          // Recoil
          document.querySelector('#gun').setAttribute('animation', 'property: rotation; to: -15 0 0; dur: 50; dir: alternate; loop: 1');

          const ray = this.components.raycaster;
          const hit = ray.getIntersection(document.querySelector('.target'));

          if (hit) {
              if (hit.el.body) {
                  // Beyond Impulse Force
                  hit.el.body.applyImpulse(new CANNON.Vec3(0, 4, -15), new CANNON.Vec3().copy(hit.point));
              }
              // Visual "Bleed" Flash
              hit.el.setAttribute('color', 'red');
              setTimeout(() => hit.el.setAttribute('color', '#444'), 100);
          }
      });

      // 3. Mod Menu Toggle (X Button)
      document.querySelector('#left-hand').addEventListener('xbuttondown', () => {
          const m = document.querySelector('#menu');
          m.setAttribute('visible', !m.getAttribute('visible'));
      });

      // 4. Crouch (Left Stick Click or Key)
      let crouching = false;
      window.addEventListener('keydown', (e) => {
          if (e.code === 'ControlLeft') {
              crouching = !crouching;
              document.querySelector('#head').setAttribute('position', crouching ? '0 0.8 0' : '0 1.6 0');
          }
      });
    </script>
  </body>
</html>
