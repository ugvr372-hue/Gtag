<!DOCTYPE html>
<html>
  <head>
    <title>VR Sandbox: GT Edition</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene xr-mode-ui="enabled: true" webxr="referenceSpaceType: local-floor">
      
      <a-assets>
        <a-asset-item id="hand" src="https://vazxmixjsiawhamurptx.supabase.co/storage/v1/object/public/models/hand-left/model.gltf"></a-asset-item>
      </a-assets>

      <a-entity environment="preset: moonlight; lighting: point; ground: canyon"></a-entity>

      <a-entity id="rig" movement-controls="controls: checkpoint" checkpoint-controls="mode: teleport">
        <a-camera position="0 1.6 0" look-controls></a-camera>
        
        <a-entity id="left-hand" oculus-touch-controls="hand: left" teleport-controls="button: trigger; cameraRig: #rig; teleportOrigin: #head;">
            <a-gltf-model src="#hand" material="color: blue" scale="1.5 1.5 1.5"></a-gltf-model>
            
            <a-entity id="mod-menu" position="0.1 0.1 0" rotation="-90 0 0" visible="false">
                <a-box color="#111" depth="0.02" height="0.5" width="0.3">
                    <a-text value="SANDBOX MENU" align="center" position="0 0.2 0.02" scale="0.15 0.15 0.15"></a-text>
                    
                    <a-plane class="menu-btn" color="blue" position="0 0.08 0.03" width="0.25" height="0.08" onclick="spawn('huggy')">
                        <a-text value="Huggy" align="center" scale="0.12 0.12 0.12"></a-text>
                    </a-plane>
                    
                    <a-plane class="menu-btn" color="purple" position="0 -0.02 0.03" width="0.25" height="0.08" onclick="spawn('catnap')">
                        <a-text value="Catnap" align="center" scale="0.12 0.12 0.12"></a-text>
                    </a-plane>

                    <a-plane class="menu-btn" color="#444" position="0 -0.15 0.03" width="0.25" height="0.08" onclick="toggleMove()">
                        <a-text id="move-text" value="MODE: TELEPORT" align="center" scale="0.1 0.1 0.1"></a-text>
                    </a-plane>
                </a-box>
            </a-entity>
        </a-entity>

        <a-entity id="right-hand" oculus-touch-controls="hand: right" laser-controls="hand: right" raycaster="objects: .menu-btn, .monster; far: 10">
            <a-gltf-model src="#hand" material="color: red" scale="1.5 1.5 1.5"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity id="world-monsters"></a-entity>

    </a-scene>

    <script>
      let isTeleport = true;

      // Toggle Menu with Y-Button (abuttondown on left hand)
      document.querySelector('#left-hand').addEventListener('xbuttondown', function() {
          const menu = document.querySelector('#mod-menu');
          menu.setAttribute('visible', !menu.getAttribute('visible'));
      });

      function toggleMove() {
          isTeleport = !isTeleport;
          const rig = document.querySelector('#rig');
          const text = document.querySelector('#move-text');
          
          if(isTeleport) {
              rig.setAttribute('movement-controls', 'controls: checkpoint');
              text.setAttribute('value', 'MODE: TELEPORT');
          } else {
              // Switches to Joystick/GT walk
              rig.setAttribute('movement-controls', 'controls: gamepad; speed: 0.2');
              text.setAttribute('value', 'MODE: JOYSTICK');
          }
      }

      function spawn(type) {
        const container = document.querySelector('#world-monsters');
        const m = document.createElement('a-entity');
        m.setAttribute('position', `${(Math.random()-0.5)*6} 0 -4`);
        m.setAttribute('class', 'monster');

        if(type === 'huggy') {
            m.innerHTML = `
                <a-box color="blue" position="0 1.5 0" scale="0.5 2.5 0.3"></a-box> <a-sphere color="blue" position="0 3 0" radius="0.4"></a-sphere> <a-cylinder color="blue" position="0.4 1.5 0" radius="0.05" height="2.5"></a-cylinder> <a-cylinder color="blue" position="-0.4 1.5 0" radius="0.05" height="2.5"></a-cylinder> <a-box color="yellow" position="0 0.2 0.2" scale="0.3 0.1 0.1"></a-box> `;
        } else {
            m.innerHTML = `
                <a-box color="purple" position="0 0.5 0" scale="0.7 0.5 1.1"></a-box> <a-sphere color="purple" position="0 1.1 0.4" radius="0.35"></a-sphere> <a-cylinder color="purple" position="0 0.5 -0.6" rotation="45 0 0" radius="0.03" height="1"></a-cylinder> <a-cone color="black" position="0.15 1.4 0.4" radius-bottom="0.05" height="0.2"></a-cone> <a-cone color="black" position="-0.15 1.4 0.4" radius-bottom="0.05" height="0.2"></a-cone> `;
        }

        m.addEventListener('click', function() {
            this.remove();
        });

        container.appendChild(m);
      }
    </script>
  </body>
</html>
