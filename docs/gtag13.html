<!DOCTYPE html>
<html>
  <head>
    <title>DinoVR: Projectile Zombies</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body style="background: #000;">
    <a-scene loading-screen="enabled: false">
      
      <a-entity id="main-menu" position="0 1.5 -2">
        <a-box id="start-btn" position="0 0 0" width="1" height="0.4" color="#222" class="clickable">
            <a-text value="START SURVIVAL" align="center" position="0 0 0.06" scale="0.5 0.5 0.5"></a-text>
        </a-box>
      </a-entity>

      <a-entity id="world" environment="preset: egypt; dressingAmount: 5"></a-entity>

      <a-entity id="rig" movement-controls="controls: gamepad; speed: 0;">
        <a-entity id="camera" camera position="0 1.6 0" look-controls>
            <a-cursor fuse="false" raycaster="objects: .clickable"></a-cursor>
            <a-text id="money-ui" value="$0" position="0.5 0.5 -1" color="yellow" scale="0.4 0.4 0.4"></a-text>
        </a-entity>

        <a-entity id="rightHand" oculus-touch-controls="hand: right" gun-controller>
            <a-entity id="gun-model" position="0 -0.05 -0.1">
                <a-box width="0.03" height="0.05" depth="0.25" color="#111"></a-box> 
                <a-box width="0.03" height="0.12" depth="0.04" color="#111" position="0 -0.06 0.06" rotation="-20 0 0"></a-box>
                <a-entity id="muzzle" position="0 0.01 -0.15"></a-entity> </a-entity>
        </a-entity>
      </a-entity>

    </a-scene>

    <script>
      let cash = 0;
      let gameActive = false;
      let zombies = [];

      document.querySelector('#start-btn').addEventListener('click', () => {
        gameActive = true;
        document.querySelector('#rig').setAttribute('movement-controls', 'speed: 0.2');
        document.querySelector('#main-menu').setAttribute('visible', 'false');
        setInterval(spawnZombie, 2000);
      });

      // --- BULLET LOGIC ---
      AFRAME.registerComponent('bullet', {
        init: function () {
          this.direction = new THREE.Vector3(0, 0, -1);
          this.direction.applyQuaternion(this.el.object3D.quaternion);
          this.speed = 0.8; // How fast the bullet flies
          this.maxLife = 100; // Frames before bullet disappears
        },
        tick: function () {
          // Move bullet forward
          this.el.object3D.position.addScaledVector(this.direction, this.speed);
          this.maxLife--;
          if (this.maxLife <= 0) this.el.parentNode.removeChild(this.el);

          // Check collision with zombies
          let bulletPos = this.el.object3D.position;
          zombies.forEach((z, index) => {
            if (!z.isDead && bulletPos.distanceTo(z.el.object3D.position) < 1) {
                createBlood(bulletPos);
                z.die();
                this.el.parentNode.removeChild(this.el);
            }
          });
        }
      });

      // --- GUN CONTROLLER ---
      AFRAME.registerComponent('gun-controller', {
        init: function () {
          this.el.addEventListener('triggerdown', () => {
            if (!gameActive) return;

            // Spawn physical bullet
            const b = document.createElement('a-sphere');
            b.setAttribute('radius', '0.02');
            b.setAttribute('color', 'yellow');
            b.setAttribute('material', 'emissive: yellow; emissiveIntensity: 5');
            
            // Get world position/rotation of the muzzle
            const muzzle = document.querySelector('#muzzle');
            let worldPos = new THREE.Vector3();
            let worldQuat = new THREE.Quaternion();
            muzzle.object3D.getWorldPosition(worldPos);
            muzzle.object3D.getWorldQuaternion(worldQuat);

            b.setAttribute('position', worldPos);
            b.object3D.setRotationFromQuaternion(worldQuat);
            b.setAttribute('bullet', '');
            
            document.querySelector('a-scene').appendChild(b);
          });
          
          // Crouch on Right Stick Click
          this.el.addEventListener('thumbstickdown', () => {
            const cam = document.querySelector('#camera');
            let isCrouched = cam.getAttribute('position').y < 1.0;
            cam.setAttribute('position', isCrouched ? '0 1.6 0' : '0 0.8 0');
          });
        }
      });

      // --- ZOMBIE LOGIC ---
      function createBlood(pos) {
        for(let i=0; i<5; i++) {
          const s = document.createElement('a-sphere');
          s.setAttribute('radius', '0.05'); s.setAttribute('color', 'red');
          s.setAttribute('position', pos);
          s.setAttribute('animation', `property: scale; to: 0 0 0; dur: 300; easing: easeInQuad`);
          document.querySelector('a-scene').appendChild(s);
          setTimeout(() => s.parentNode.removeChild(s), 300);
        }
      }

      function spawnZombie() {
        if (!gameActive) return;
        const zEntity = document.createElement('a-entity');
        const angle = Math.random() * Math.PI * 2;
        const x = Math.cos(angle) * 15;
        const zPos = Math.sin(angle) * 15;
        zEntity.setAttribute('position', `${x} 0 ${zPos}`);
        
        const zObj = {
          el: zEntity,
          isDead: false,
          die: function() {
            this.isDead = true;
            this.el.setAttribute('animation', 'property: rotation; to: -90 0 0; dur: 300');
            cash += 5;
            document.querySelector('#money-ui').setAttribute('value', '$' + cash);
            setTimeout(() => {
                zombies = zombies.filter(item => item !== this);
                if(this.el.parentNode) this.el.parentNode.removeChild(this.el);
            }, 500);
          }
        };

        zEntity.innerHTML = `<a-box width="0.6" height="1.8" depth="0.3" color="#2d3319"></a-box>`;
        
        // Zombie AI tick
        zEntity.tick = () => {
          if (zObj.isDead) return;
          let pPos = new THREE.Vector3();
          document.querySelector('#camera').object3D.getWorldPosition(pPos);
          zEntity.object3D.lookAt(pPos.x, 0, pPos.z);
          let dir = new THREE.Vector3().subVectors(pPos, zEntity.object3D.position).normalize();
          zEntity.object3D.position.addScaledVector(dir, 0.04);
        };

        document.querySelector('a-scene').appendChild(zEntity);
        zombies.push(zObj);

        // Custom ticker for zombie movement
        setInterval(() => zEntity.tick(), 16);
      }
    </script>
  </body>
</html>
