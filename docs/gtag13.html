<!DOCTYPE html>
<html>
<head>
    <title>Infinite Craft VR - Pro</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/super-hands@^3.0.3/dist/super-hands.min.js"></script>
    
    <script>
        // 1. FLOATING MOVEMENT COMPONENT
        AFRAME.registerComponent('floaty', {
            init: function() {
                this.seed = Math.random() * 100;
            },
            tick: function(t) {
                // If the object is being grabbed, don't float it
                if (this.el.is('grabbed')) return;
                
                const yOffset = Math.sin((t / 1000) + this.seed) * 0.2;
                const xOffset = Math.cos((t / 1500) + this.seed) * 0.1;
                let pos = this.el.getAttribute('position');
                this.el.setAttribute('position', {
                    x: pos.x + (xOffset * 0.01), 
                    y: pos.y + (yOffset * 0.005), 
                    z: pos.z
                });
            }
        });

        // 2. COMBINE ON GRAB COLLISION
        AFRAME.registerComponent('craftable', {
            init: function() {
                this.el.addEventListener('collidewith', (e) => {
                    const otherEl = e.detail.otherEl;
                    // Only craft if BOTH are being grabbed by the player
                    if (this.el.is('grabbed') && otherEl.is('grabbed')) {
                        combine(this.el, otherEl);
                    }
                });
            }
        });
    </script>
</head>
<body>

    <a-scene physics="gravity: 0; debug: false">
        <a-assets>
            <a-mixin id="element" 
                     geometry="primitive: box; width: 0.5; height: 0.5; depth: 0.1"
                     hoverable grabbable draggable droppable
                     floaty craftable
                     class="clickable item"></a-mixin>
        </a-assets>

        <a-entity environment="preset: starry; groundColor: #111; grid: dots"></a-entity>

        <a-entity id="rig" movement-controls="controls: checkpoint, gamepad, keyboard, touch; speed: 0.2">
            <a-entity camera position="0 1.6 0" look-controls>
                <a-cursor raycaster="objects: .clickable"></a-cursor>
            </a-entity>
            
            <a-entity sphere-collider="objects: .item" 
                      super-hands 
                      hand-controls="hand: left"
                      oculus-touch-controls="hand: left">
            </a-entity>
            
            <a-entity sphere-collider="objects: .item" 
                      super-hands 
                      hand-controls="hand: right"
                      oculus-touch-controls="hand: right">
            </a-entity>
        </a-entity>

        <a-entity id="world">
            <a-entity mixin="element" position="-1 1.5 -2" material="color: #ff4444" data-name="Fire">
                <a-text value="Fire" align="center" position="0 0 0.06" width="4"></a-text>
            </a-entity>

            <a-entity mixin="element" position="1 1.5 -2" material="color: #4444ff" data-name="Water">
                <a-text value="Water" align="center" position="0 0 0.06" width="4"></a-text>
            </a-entity>

            <a-entity mixin="element" position="-1 2.5 -2" material="color: #44ff44" data-name="Earth">
                <a-text value="Earth" align="center" position="0 0 0.06" width="4"></a-text>
            </a-entity>

            <a-entity mixin="element" position="1 2.5 -2" material="color: #ffffff" data-name="Wind">
                <a-text value="Wind" align="center" position="0 0 0.06" width="4" color="black"></a-text>
            </a-entity>
        </a-entity>

    </a-scene>

    <script>
        const recipes = {
            "Fire+Water": { name: "Steam", color: "#bdc3c7" },
            "Fire+Earth": { name: "Lava", color: "#e67e22" },
            "Water+Earth": { name: "Mud", color: "#795548" },
            "Earth+Wind": { name: "Dust", color: "#f1c40f" }
        };

        function combine(el1, el2) {
            const n1 = el1.getAttribute('data-name');
            const n2 = el2.getAttribute('data-name');
            const combo = recipes[`${n1}+${n2}`] || recipes[`${n2}+${n1}`];

            if (combo) {
                // Get midpoint for new element
                const p1 = el1.object3D.position;
                const p2 = el2.object3D.position;
                const mid = { x: (p1.x + p2.x)/2, y: (p1.y + p2.y)/2, z: (p1.z + p2.z)/2 };

                // Create the new element
                createNew(combo.name, combo.color, mid);

                // "Poof" effect: Move the old elements back to start positions
                el1.setAttribute('position', `${(Math.random()-0.5)*2} 1.5 -2`);
                el2.setAttribute('position', `${(Math.random()-0.5)*2} 1.5 -2`);
            }
        }

        function createNew(name, color, pos) {
            const world = document.querySelector('#world');
            const newEl = document.createElement('a-entity');
            newEl.setAttribute('mixin', 'element');
            newEl.setAttribute('material', `color: ${color}`);
            newEl.setAttribute('position', pos);
            newEl.setAttribute('data-name', name);
            
            const txt = document.createElement('a-text');
            txt.setAttribute('value', name);
            txt.setAttribute('align', 'center');
            txt.setAttribute('position', '0 0 0.06');
            txt.setAttribute('width', '4');
            
            newEl.appendChild(txt);
            world.appendChild(newEl);
        }

        // Custom Collision logic for super-hands
        setInterval(() => {
            const items = document.querySelectorAll('.item');
            items.forEach(a => {
                items.forEach(b => {
                    if (a === b) return;
                    const dist = a.object3D.position.distanceTo(b.object3D.position);
                    if (dist < 0.4) {
                        a.emit('collidewith', {otherEl: b});
                    }
                });
            });
        }, 100);
    </script>
</body>
</html>
