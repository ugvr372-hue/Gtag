<!DOCTYPE html>
<html>
  <head>
    <title>Poppy Forest Sandbox VR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene xr-mode-ui="enabled: true" webxr="referenceSpaceType: local-floor">
      
      <a-assets>
        <a-asset-item id="handModel" src="https://vazxmixjsiawhamurptx.supabase.co/storage/v1/object/public/models/hand-left/model.gltf"></a-asset-item>
      </a-assets>

      <a-entity environment="preset: osiris; ground: hills; dressing: trees; dressingAmount: 100; lighting: point; shadow: true"></a-entity>

      <a-entity id="rig" movement-controls="fly: false; speed: 0.2">
        <a-camera id="head" position="0 1.6 0" look-controls></a-camera>
        
        <a-entity id="left-hand" oculus-touch-controls="hand: left">
            <a-gltf-model src="#handModel" material="color: blue" scale="1.5 1.5 1.5"></a-gltf-model>
            
            <a-entity id="mod-menu" position="0.1 0.1 0.1" rotation="-90 0 0" visible="false">
                <a-plane color="#111" height="0.6" width="0.4" opacity="0.9">
                    <a-text value="SANDBOX MENU" align="center" position="0 0.25 0.01" scale="0.2 0.2 0.2"></a-text>
                    
                    <a-plane class="menu-btn" color="blue" position="0 0.1 0.02" width="0.3" height="0.1" onclick="spawn('huggy')">
                        <a-text value="Spawn Huggy" align="center" scale="0.15 0.15 0.15"></a-text>
                    </a-plane>
                    
                    <a-plane class="menu-btn" color="purple" position="0 -0.05 0.02" width="0.3" height="0.1" onclick="spawn('catnap')">
                        <a-text value="Spawn Catnap" align="center" scale="0.15 0.15 0.15"></a-text>
                    </a-plane>

                    <a-plane class="menu-btn" color="red" position="0 -0.2 0.02" width="0.3" height="0.1" onclick="clearAll()">
                        <a-text value="Clear All" align="center" scale="0.15 0.15 0.15"></a-text>
                    </a-plane>
                </a-plane>
            </a-entity>
        </a-entity>

        <a-entity id="right-hand" oculus-touch-controls="hand: right" laser-controls="hand: right" raycaster="objects: .menu-btn, .monster; far: 10">
            <a-gltf-model src="#handModel" material="color: red" scale="1.5 1.5 1.5"></a-gltf-model>
        </a-entity>
      </a-entity>

      <a-entity id="world-monsters"></a-entity>

    </a-scene>

    <script>
      // Toggle Menu with X or Y (Quest buttons)
      document.querySelector('#left-hand').addEventListener('xbuttondown', function() {
          const menu = document.querySelector('#mod-menu');
          menu.setAttribute('visible', !menu.getAttribute('visible'));
      });
      document.querySelector('#left-hand').addEventListener('ybuttondown', function() {
          const menu = document.querySelector('#mod-menu');
          menu.setAttribute('visible', !menu.getAttribute('visible'));
      });

      function clearAll() {
          document.querySelector('#world-monsters').innerHTML = '';
      }

      function spawn(type) {
        const container = document.querySelector('#world-monsters');
        const m = document.createElement('a-entity');
        m.setAttribute('position', `${(Math.random()-0.5)*10} 0 -5`);
        m.setAttribute('class', 'monster');

        if(type === 'huggy') {
            m.innerHTML = `
                <a-box color="#0033ff" position="0 1.5 0" scale="0.6 2.5 0.4"></a-box> 
                <a-sphere color="#0033ff" position="0 3 0" radius="0.4"></a-sphere>
                <a-cylinder color="#0033ff" position="0.5 1.5 0" radius="0.05" height="2.5"></a-cylinder> 
                <a-cylinder color="#0033ff" position="-0.5 1.5 0" radius="0.05" height="2.5"></a-cylinder>
            `;
        } else {
            m.innerHTML = `
                <a-box color="#6600cc" position="0 0.5 0" scale="0.8 0.5 1.2"></a-box>
                <a-sphere color="#6600cc" position="0 1.2 0.4" radius="0.4"></a-sphere>
                <a-cylinder color="#6600cc" position="0 0.5 -0.6" rotation="45 0 0" radius="0.03" height="1.2"></a-cylinder>
            `;
        }

        // Click to delete
        m.addEventListener('click', function() {
            this.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 200');
            setTimeout(() => this.remove(), 200);
        });

        container.appendChild(m);
      }
    </script>
  </body>
</html>
