<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>A-Frame VR Shooter - Urban Industrial</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
    
    <script>
      let score = 0;

      // Bullet Component
      AFRAME.registerComponent('bullet', {
        schema: { speed: { default: 25 } },
        init: function () {
          this.direction = new THREE.Vector3();
        },
        tick: function (time, delta) {
          if (!this.el.getAttribute('visible')) return;

          const distance = (this.data.speed * delta) / 1000;
          this.el.object3D.translateZ(-distance);

          const bulletPos = this.el.object3D.position;
          const enemies = document.querySelectorAll('.enemy');
          
          enemies.forEach((enemy) => {
            if (bulletPos.distanceTo(enemy.object3D.position) < 0.7) {
              this.hit(enemy);
            }
          });

          if (bulletPos.length() > 40) { this.reset(); }
        },
        hit: function (enemy) {
          score += 100;
          const explosion = document.querySelector('#explosion-template').cloneNode(true);
          explosion.setAttribute('position', enemy.getAttribute('position'));
          explosion.setAttribute('visible', 'true');
          this.el.sceneEl.appendChild(explosion);
          
          enemy.parentNode.removeChild(enemy);
          setTimeout(() => { if(explosion.parentNode) explosion.parentNode.removeChild(explosion) }, 500);
          this.reset();
        },
        reset: function() {
          this.el.setAttribute('visible', false);
          this.el.pause();
        }
      });

      // Shooter Component
      AFRAME.registerComponent('shooter', {
        init: function () {
          this.bulletIdx = 0;
          this.bullets = [];
          
          for (let i = 0; i < 15; i++) {
            let b = document.createElement('a-sphere');
            b.setAttribute('radius', '0.05');
            b.setAttribute('color', '#FFD700');
            b.setAttribute('bullet', '');
            b.setAttribute('visible', false);
            this.el.sceneEl.appendChild(b);
            this.bullets.push(b);
          }

          // Support both VR Controllers and Desktop Click
          this.el.addEventListener('triggerdown', () => this.fire());
          window.addEventListener('mousedown', () => this.fire());
        },
        fire: function () {
          const flash = document.querySelector('#muzzle-flash');
          if(flash) {
            flash.setAttribute('visible', true);
            setTimeout(() => flash.setAttribute('visible', false), 50);
          }

          const bullet = this.bullets[this.bulletIdx];
          const worldPos = new THREE.Vector3();
          const worldDir = new THREE.Quaternion();
          
          this.el.object3D.getWorldPosition(worldPos);
          this.el.object3D.getWorldQuaternion(worldDir);

          bullet.object3D.position.copy(worldPos);
          bullet.object3D.applyQuaternion(worldDir);
          bullet.setAttribute('visible', true);
          bullet.play();

          this.bulletIdx = (this.bulletIdx + 1) % this.bullets.length;
        }
      });

      // Simple Enemy Spawner
      AFRAME.registerComponent('enemy-manager', {
        init: function() {
          setInterval(() => {
            let enemy = document.createElement('a-box');
            enemy.setAttribute('class', 'enemy');
            enemy.setAttribute('color', '#FF4444');
            let x = (Math.random() - 0.5) * 20;
            let z = (Math.random() - 0.5) * 20 - 10;
            enemy.setAttribute('position', `${x} 1.5 ${z}`);
            enemy.setAttribute('animation', 'property: rotation; to: 0 360 0; loop: true; dur: 2000');
            this.el.appendChild(enemy);
          }, 3000);
        }
      });
    </script>
  </head>
  <body>
    <a-scene enemy-manager>
      <a-assets>
        <a-sphere id="explosion-template" radius="0.5" color="orange" visible="false" animation="property: scale; to: 2 2 2; dur: 500"></a-sphere>
      </a-assets>

      <a-entity environment="preset: arches; dressingAmount: 50; dressingColor: #555; groundColor: #222"></a-entity>

      <a-entity id="rig" position="0 0 5">
        <a-camera shooter>
          <a-light id="muzzle-flash" type="point" color="yellow" intensity="2" distance="2" position="0 0 -0.5" visible="false"></a-light>
          <a-cursor color="cyan"></a-cursor>
        </a-camera>
        
        <a-entity laser-controls="hand: right" shooter></a-entity>
      </a-entity>

      <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#111" opacity="0.5"></a-plane>
    </a-scene>
  </body>
</html>
