<!DOCTYPE html>
<html>
  <head>
    <title>DINOVR: Poppy Playtime REBORN</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
  </head>
  <body style="background: #000;">
    <a-scene webxr="requiredFeatures: local-floor" fog="type: exponential; color: #000; density: 0.15">
      
      <a-assets>
        <img id="floor-tex" src="https://i.imgur.com/8pXoA7v.jpg">
      </a-assets>

      <a-sky color="black"></a-sky>
      <a-plane rotation="-90 0 0" width="100" height="100" src="#floor-tex" repeat="40 40"></a-plane>

      <a-entity id="maze">
        <a-box position="0 1.5 -5" width="10" height="3" depth="0.2" color="#222"></a-box>
        <a-box position="5 1.5 0" width="0.2" height="3" depth="10" color="#222"></a-box>
        <a-box position="-5 1.5 0" width="0.2" height="3" depth="10" color="#222"></a-box>
        <a-box position="0 3 0" width="10" height="0.2" depth="10" color="#111"></a-box> 
      </a-entity>

      <a-entity id="huggy" position="0 0 -15" visible="false">
          <a-box width="0.1" height="2.5" depth="0.1" position="0.2 1.25 0" color="#0033cc"></a-box>
          <a-box width="0.1" height="2.5" depth="0.1" position="-0.2 1.25 0" color="#0033cc"></a-box>
          <a-box width="0.4" height="1.5" depth="0.2" position="0 3.2 0" color="#0033cc">
              <a-box width="0.1" height="2.5" depth="0.1" position="0.4 -0.5 0" rotation="0 0 -20" color="#0033cc"></a-box>
              <a-box width="0.1" height="2.5" depth="0.1" position="-0.4 -0.5 0" rotation="0 0 20" color="#0033cc"></a-box>
              <a-box width="0.7" height="0.7" depth="0.5" position="0 1 0" color="#0033cc">
                  <a-plane position="0 -0.1 0.26" width="0.5" height="0.3" color="red"></a-plane> <a-sphere position="-0.15 0.2 0.26" radius="0.07" color="white"><a-sphere radius="0.02" color="black" position="0 0 0.06"></a-sphere></a-sphere>
                  <a-sphere position="0.15 0.2 0.26" radius="0.07" color="white"><a-sphere radius="0.02" color="black" position="0 0 0.06"></a-sphere></a-sphere>
              </a-box>
          </a-box>
      </a-entity>

      <a-entity id="rig" movement-controls="speed: 0.1;">
        <a-entity camera position="0 1.6 0" look-controls>
            <a-cursor fuse="false" raycaster="objects: .interact"></a-cursor>
            <a-light type="spot" color="#fff" intensity="0.8" distance="15" angle="30" position="0 0 0"></a-light> </a-entity>

        <a-entity id="hand" oculus-touch-controls="hand: right" grabpack-v2>
            <a-entity id="hand-model" position="0 0 -0.1">
                <a-box width="0.05" height="0.05" depth="0.1" color="#333"></a-box>
                <a-box id="red-hand-visual" width="0.15" height="0.15" depth="0.03" color="red" position="0 0 -0.1"></a-box>
            </a-entity>
        </a-entity>
      </a-entity>

    </a-scene>

    <script>
      let huggyStarted = false;
      let handFired = false;

      // --- GRABPACK LOGIC ---
      AFRAME.registerComponent('grabpack-v2', {
        init: function() {
          const visual = document.querySelector('#red-hand-visual');
          
          this.el.addEventListener('triggerdown', () => {
            if(handFired) return;
            handFired = true;
            
            // Fire Hand
            visual.setAttribute('animation', 'property: position; to: 0 0 -15; dur: 500; easing: easeOutQuad');
            
            // Activate Huggy on first fire
            if(!huggyStarted) {
                huggyStarted = true;
                const h = document.querySelector('#huggy');
                h.setAttribute('visible', 'true');
            }

            // Return Hand
            setTimeout(() => {
                visual.setAttribute('animation', 'property: position; to: 0 0 -0.1; dur: 800; easing: easeInQuad');
                setTimeout(() => { handFired = false; }, 800);
            }, 600);
          });
        }
      });

      // --- HUGGY AI ---
      setInterval(() => {
          if(!huggyStarted) return;
          const huggy = document.querySelector('#huggy');
          const player = document.querySelector('[camera]').object3D.position;
          const rig = document.querySelector('#rig').object3D.position;

          // Smooth tracking
          huggy.object3D.lookAt(rig.x, 0, rig.z);
          huggy.object3D.translateZ(0.08); // Huggy is faster now!

          // Collision/Jumpscare
          let dist = huggy.object3D.position.distanceTo(rig);
          if(dist < 1.5) {
              document.body.style.backgroundColor = "red";
              // Reset
              setTimeout(() => { location.reload(); }, 500);
          }
      }, 20);

    </script>
  </body>
</html>
