<!DOCTYPE html>
<html>
<head>
    <title>Infinite Craft VR - Smooth Edition</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/super-hands@3.0.4/dist/super-hands.min.js"></script>
</head>
<body>

    <a-scene renderer="antialias: true">
        <a-assets>
            <a-mixin id="element" 
                     geometry="primitive: box; width: 0.4; height: 0.4; depth: 0.1"
                     hoverable grabbable
                     class="clickable item"></a-mixin>
        </a-assets>

        <a-sky color="#050505"></a-sky>
        <a-grid-helper size="100" divisions="100" colorCenter="#222" colorGrid="#111"></a-grid-helper>

        <a-entity id="rig" movement-controls="speed: 0.15">
            <a-entity camera position="0 1.6 0" look-controls>
                <a-cursor raycaster="objects: .clickable" color="cyan"></a-cursor>
            </a-entity>
            
            <a-entity sphere-collider="objects: .item; radius: 0.15" 
                      super-hands 
                      hand-controls="hand: left"
                      oculus-touch-controls="hand: left">
            </a-entity>
            
            <a-entity sphere-collider="objects: .item; radius: 0.15" 
                      super-hands 
                      hand-controls="hand: right"
                      oculus-touch-controls="hand: right">
            </a-entity>
        </a-entity>

        <a-entity id="world">
            <a-entity mixin="element" position="-0.8 1.5 -1.5" material="color: #ff4444" data-name="Fire">
                <a-text value="Fire" align="center" position="0 0 0.06" width="3"></a-text>
            </a-entity>

            <a-entity mixin="element" position="0.8 1.5 -1.5" material="color: #4444ff" data-name="Water">
                <a-text value="Water" align="center" position="0 0 0.06" width="3"></a-text>
            </a-entity>

            <a-entity mixin="element" position="-0.8 2.2 -1.5" material="color: #4e342e" data-name="Earth">
                <a-text value="Earth" align="center" position="0 0 0.06" width="3"></a-text>
            </a-entity>

            <a-entity mixin="element" position="0.8 2.2 -1.5" material="color: #ffffff" data-name="Wind">
                <a-text value="Wind" align="center" position="0 0 0.06" width="3" color="black"></a-text>
            </a-entity>
        </a-entity>

    </a-scene>

    <script>
        const recipes = {
            "Fire+Water": { name: "Steam", color: "#bdc3c7" },
            "Fire+Earth": { name: "Lava", color: "#ff6600" },
            "Water+Earth": { name: "Mud", color: "#6d4c41" },
            "Earth+Wind": { name: "Dust", color: "#d2b48c" },
            "Fire+Wind": { name: "Smoke", color: "#777777" },
            "Water+Wind": { name: "Wave", color: "#00ccff" }
        };

        // Custom loop to check for collisions without crashing the browser
        setInterval(() => {
            const items = Array.from(document.querySelectorAll('.item'));
            
            for (let i = 0; i < items.length; i++) {
                for (let j = i + 1; j < items.length; j++) {
                    const a = items[i];
                    const b = items[j];

                    // Check distance
                    const posA = a.object3D.position;
                    const posB = b.object3D.position;
                    const dist = posA.distanceTo(posB);

                    // If they touch AND BOTH ARE BEING GRABBED
                    if (dist < 0.3 && a.is('grabbed') && b.is('grabbed')) {
                        const n1 = a.getAttribute('data-name');
                        const n2 = b.getAttribute('data-name');
                        const combo = recipes[`${n1}+${n2}`] || recipes[`${n2}+${n1}`];

                        if (combo) {
                            // Calculate midpoint for spawn
                            const mid = {
                                x: (posA.x + posB.x) / 2,
                                y: (posA.y + posB.y) / 2,
                                z: (posA.z + posB.z) / 2
                            };
                            
                            // Spawn new item
                            createNew(combo.name, combo.color, mid);
                            
                            // Visual reset: Put original items back slightly apart
                            a.setAttribute('position', {x: posA.x - 0.5, y: posA.y, z: posA.z});
                            b.setAttribute('position', {x: posB.x + 0.5, y: posB.y, z: posB.z});
                        }
                    }
                }
            }
        }, 200); // Check 5 times per second (Low impact on CPU)

        function createNew(name, color, pos) {
            // Check if this element already exists so we don't spam the same ones
            const existing = document.querySelector(`[data-name="${name}"]`);
            if (existing) return; 

            const world = document.querySelector('#world');
            const newEl = document.createElement('a-entity');
            newEl.setAttribute('mixin', 'element');
            newEl.setAttribute('material', `color: ${color}`);
            newEl.setAttribute('position', pos);
            newEl.setAttribute('data-name', name);
            
            const txt = document.createElement('a-text');
            txt.setAttribute('value', name);
            txt.setAttribute('align', 'center');
            txt.setAttribute('position', '0 0 0.06');
            txt.setAttribute('width', '3');
            
            newEl.appendChild(txt);
            world.appendChild(newEl);
            
            // Play a small sound or haptic feedback if possible
            console.log("Unlocked: " + name);
        }
    </script>
</body>
</html>
