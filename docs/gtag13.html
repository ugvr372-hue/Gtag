<!DOCTYPE html>
<html>
  <head>
    <title>Monke Sandbox - G-Tag Locomotion</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/n5ro/aframe-physics-system@v4.0.1/dist/aframe-physics-system.min.js"></script>
  </head>
  <body>
    <a-scene physics="debug: false; gravity: -9.8; iterations: 20">
      
      <a-assets>
        <a-asset-item id="hand-model" src="https://vazxmixjsiawhamurptx.supabase.co/storage/v1/object/public/models/hand-left/model.gltf"></a-asset-item>
      </a-assets>

      <a-entity environment="preset: osiris; ground: hills; dressingAmount: 50" static-body></a-entity>

      <a-entity id="rig" movement-controls="fly: false; speed: 0.3" kinematic-body="radius: 0.3">
        
        <a-entity camera id="head" position="0 1.6 0" look-controls>
            <a-box color="#222" scale="0.25 0.15 0.2" position="0 0 -0.05"></a-box> 
            <a-cylinder color="gray" radius="0.02" height="0.4" rotation="90 0 0" position="0 0 -0.2"></a-cylinder> <a-cylinder id="multiplayer-body" color="#5a3d2b" height="1.2" radius="0.25" position="0 -0.8 0.25" opacity="0.8"></a-cylinder>
        </a-entity>
        
        <a-entity id="left-hand" oculus-touch-controls="hand: left">
            <a-cylinder color="#5a3d2b" radius="0.04" height="1.2" position="0 0 -0.5" rotation="90 0 0"></a-cylinder>
            <a-sphere color="#5a3d2b" radius="0.1" position="0 0 -1.1" static-body="shape: sphere; sphereRadius: 0.1">
                <a-entity id="mod-menu" position="0 0.12 0" rotation="-90 0 0" visible="false">
                    <a-plane color="#111" height="0.4" width="0.25">
                        <a-text value="MONKE MODS" align="center" position="0 0.15 0.01" scale="0.1 0.1 0.1"></a-text>
                        <a-plane class="menu-btn" color="blue" position="0 0.05 0.02" width="0.2" height="0.05" onclick="setGun('huggy')"><a-text value="Huggy" align="center" scale="0.08 0.08 0.08"></a-text></a-plane>
                        <a-plane class="menu-btn" color="purple" position="0 -0.05 0.02" width="0.2" height="0.05" onclick="setGun('catnap')"><a-text value="Catnap" align="center" scale="0.08 0.08 0.08"></a-text></a-plane>
                        <a-plane class="menu-btn" color="cyan" position="0 -0.15 0.02" width="0.2" height="0.05" onclick="setGun('tp')"><a-text value="TP Gun" align="center" scale="0.08 0.08 0.08"></a-text></a-plane>
                    </a-plane>
                </a-entity>
            </a-sphere>
        </a-entity>

        <a-entity id="right-hand" oculus-touch-controls="hand: right" laser-controls="hand: right" raycaster="objects: .menu-btn, .environmentGround; far: 40">
            <a-cylinder color="#5a3d2b" radius="0.04" height="1.2" position="0 0 -0.5" rotation="90 0 0"></a-cylinder>
            <a-sphere id="gun-hand" color="#5a3d2b" radius="0.1" position="0 0 -1.1" static-body="shape: sphere; sphereRadius: 0.1">
                <a-sphere id="gun-tip" position="0 0 -0.1" radius="0.02" color="blue"></a-sphere>
            </a-sphere>
        </a-entity>
      </a-entity>

      <a-entity id="spawn-root"></a-entity>

    </a-scene>

    <script>
      let currentMode = 'huggy';

      // Toggle Menu with X button
      document.querySelector('#left-hand').addEventListener('xbuttondown', () => {
          const menu = document.querySelector('#mod-menu');
          menu.setAttribute('visible', !menu.getAttribute('visible'));
      });

      function setGun(m) {
          currentMode = m;
          const colors = {huggy: 'blue', catnap: 'purple', tp: 'cyan'};
          document.querySelector('#gun-tip').setAttribute('color', colors[m]);
      }

      // Shooting Logic
      document.querySelector('#right-hand').addEventListener('triggerdown', function() {
          const ray = this.components.raycaster;
          const hit = ray.getIntersection(document.querySelector('.environmentGround'));
          if (!hit) return;

          if (currentMode === 'tp') {
              document.querySelector('#rig').setAttribute('position', {x: hit.point.x, y: 0, z: hit.point.z});
          } else {
              const m = document.createElement('a-entity');
              m.setAttribute('position', hit.point);
              m.setAttribute('class', 'monster');
              const c = currentMode === 'huggy' ? 'blue' : 'purple';
              m.innerHTML = `<a-box color="${c}" position="0 1 0" scale="0.4 2 0.3"></a-box><a-sphere color="${c}" position="0 2.2 0" radius="0.3"></a-sphere>`;
              document.querySelector('#spawn-root').appendChild(m);
          }
      });

      // G-TAG LOCOMOTION HELPER
      // This script detects if the hands "hit" the ground and applies an upward force
      AFRAME.registerComponent('monke-move', {
        tick: function() {
          const rig = document.querySelector('#rig');
          const lHand = document.querySelector('#left-hand').object3D.position;
          const rHand = document.querySelector('#right-hand').object3D.position;
          
          // If hand is below floor level, push rig up
          if (lHand.y < 0.2 || rHand.y < 0.2) {
             // Simple physics bounce
             rig.body.applyImpulse(new CANNON.Vec3(0, 2, 0), new CANNON.Vec3().copy(rig.object3D.position));
          }
        }
      });
    </script>
  </body>
</html>
