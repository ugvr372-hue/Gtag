<!DOCTYPE html>
<html>
  <head>
    <title>BEYOND | Browser Sandbox</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/n5ro/aframe-physics-system@v4.0.1/dist/aframe-physics-system.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene physics="gravity: -12; iterations: 40">
      
      <a-assets>
          <a-asset-item id="hand-l" src="https://vazxmixjsiawhamurptx.supabase.co/storage/v1/object/public/models/hand-left/model.gltf"></a-asset-item>
          <a-asset-item id="hand-r" src="https://vazxmixjsiawhamurptx.supabase.co/storage/v1/object/public/models/hand-right/model.gltf"></a-asset-item>
      </a-assets>

      <a-entity environment="preset: forest; lighting: point; groundColor: #111; dressingAmount: 15"></a-entity>
      <a-box static-body position="0 -5 0" width="300" height="10" depth="300" visible="false"></a-box>

      <a-entity id="rig" dynamic-body="shape: sphere; sphereRadius: 0.4; mass: 10">
        <a-entity camera look-controls position="0 0.6 0">
            <a-box color="#111" scale="0.2 0.1 0.15" position="0 0 -0.05"></a-box>
        </a-entity>

        <a-entity id="left-hand" oculus-touch-controls="hand: left">
            <a-gltf-model src="#hand-l" scale="1.6 1.6 1.6" static-body="shape: sphere; sphereRadius: 0.1"></a-gltf-model>
            
            <a-entity id="beyond-menu" position="0 0.12 0.05" rotation="-90 0 0" visible="false">
                <a-plane color="#0a0a0a" height="0.6" width="0.4" opacity="0.9">
                    <a-text value="BEYOND v1.0" align="center" position="0 0.25 0.01" scale="0.15 0.15 0.15" color="#00ffcc"></a-text>
                    
                    <a-plane class="menu-btn" color="#222" position="-0.1 -0.2 0.01" width="0.15" height="0.06" onclick="setCategory('entities')"><a-text value="ENTITIES" align="center" scale="0.08 0.08 0.08"></a-text></a-plane>
                    <a-plane class="menu-btn" color="#222" position="0.1 -0.2 0.01" width="0.15" height="0.06" onclick="setCategory('tools')"><a-text value="TOOLS" align="center" scale="0.08 0.08 0.08"></a-text></a-plane>

                    <a-entity id="menu-items">
                        <a-plane class="menu-btn" color="#333" position="0 0.1 0.01" width="0.35" height="0.08" onclick="spawn('npc')"><a-text value="Spawn NPC" align="center" scale="0.1 0.1 0.1"></a-text></a-plane>
                        <a-plane class="menu-btn" color="#333" position="0 0 0.01" width="0.35" height="0.08" onclick="spawn('box')"><a-text value="Spawn Prop" align="center" scale="0.1 0.1 0.1"></a-text></a-plane>
                        <a-plane class="menu-btn" color="#333" position="0 -0.1 0.01" width="0.35" height="0.08" onclick="toggleFly()"><a-text id="fly-status" value="Fly: OFF" align="center" scale="0.1 0.1 0.1"></a-text></a-plane>
                    </a-entity>
                </a-plane>
            </a-entity>
        </a-entity>

        <a-entity id="right-hand" oculus-touch-controls="hand: right" laser-controls="hand: right" raycaster="objects: .menu-btn, .environmentGround; far: 50">
            <a-gltf-model src="#hand-r" scale="1.6 1.6 1.6" static-body="shape: sphere; sphereRadius: 0.1"></a-gltf-model>
            <a-sphere id="aim-dot" position="0 0 -0.1" radius="0.01" color="#00ffcc"></a-sphere>
        </a-entity>
      </a-entity>

      <a-entity id="sandbox-world"></a-entity>

    </a-scene>

    <script>
      let isFlying = false;

      // Menu Toggle
      document.querySelector('#left-hand').addEventListener('xbuttondown', () => {
          const m = document.querySelector('#beyond-menu');
          m.setAttribute('visible', !m.getAttribute('visible'));
      });

      // Spawning Logic
      function spawn(type) {
          const hit = document.querySelector('#right-hand').components.raycaster.getIntersection(document.querySelector('.environmentGround'));
          if (!hit) return;
          
          const el = document.createElement('a-entity');
          el.setAttribute('position', hit.point);
          if (type === 'npc') {
              el.innerHTML = `<a-box color="red" scale="0.5 1.5 0.3" dynamic-body></a-box><a-sphere color="white" position="0 1 0" radius="0.25" dynamic-body></a-sphere>`;
          } else {
              el.setAttribute('geometry', 'primitive: box');
              el.setAttribute('material', 'color: #777');
              el.setAttribute('dynamic-body', 'mass: 2');
          }
          document.querySelector('#sandbox-world').appendChild(el);
      }

      function toggleFly() {
          isFlying = !isFlying;
          const rig = document.querySelector('#rig');
          rig.setAttribute('movement-controls', isFlying ? 'fly: true; speed: 0.4' : 'fly: false; speed: 0');
          rig.body.mass = isFlying ? 0 : 10;
          document.querySelector('#fly-status').setAttribute('value', `Fly: ${isFlying ? 'ON' : 'OFF'}`);
      }

      // Locomotion (Slap)
      document.querySelectorAll('#left-hand, #right-hand').forEach(h => {
          h.addEventListener('collide', () => {
              if (isFlying) return;
              document.querySelector('#rig').body.applyImpulse(new CANNON.Vec3(0, 10, 0), new CANNON.Vec3().copy(document.querySelector('#rig').object3D.position));
          });
      });
    </script>
  </body>
</html>
