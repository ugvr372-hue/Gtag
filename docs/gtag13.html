<!DOCTYPE html>
<html>
<head>
  <title>Simple VR Shooter</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
  <a-scene>

    <!-- Player Camera -->
    <a-entity id="player" position="0 1.6 0">
      <a-camera>
        <a-cursor color="red"></a-cursor>
      </a-camera>
    </a-entity>

    <!-- Ground -->
    <a-plane rotation="-90 0 0" width="50" height="50" color="#7BC8A4"></a-plane>

    <!-- Targets -->
    <a-box position="0 1 -5" color="red" class="target"></a-box>
    <a-box position="2 1 -6" color="blue" class="target"></a-box>
    <a-box position="-2 1 -4" color="yellow" class="target"></a-box>

    <!-- Shooting Script -->
    <script>
      AFRAME.registerComponent('shoot', {
        init: function () {
          window.addEventListener('click', () => {
            const camera = document.querySelector('[camera]');
            const raycaster = new THREE.Raycaster();
            const direction = new THREE.Vector3();
            camera.object3D.getWorldDirection(direction);

            raycaster.set(camera.object3D.position, direction);
            const targets = document.querySelectorAll('.target');
            const intersects = raycaster.intersectObjects(
              Array.from(targets).map(t => t.object3D), true
            );

            if (intersects.length > 0) {
              const hit = intersects[0].object.el;
              hit.setAttribute('color', 'black'); // simulate hit
            }
          });
        }
      });

      document.querySelector('#player').setAttribute('shoot', '');
    </script>

  </a-scene>
</body>
</html>
