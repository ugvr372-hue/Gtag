<!DOCTYPE html>
<html>
  <head>
    <title>DinoVR: Black Ops Quest</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene renderer="antialias: true; colorManagement: true;">
      
      <a-assets>
        <a-asset-item id="gunModel" src="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models/2.0/SciFiHelmet/glTF/SciFiHelmet.gltf"></a-asset-item>
      </a-assets>

      <a-entity id="environment" environment="preset: egypt; dressingAmount: 100; ground: spikes"></a-entity>

      <a-entity id="rig" movement-controls="controls: gamepad; speed: 0.2;">
        <a-entity id="camera" camera position="0 1.6 0" look-controls></a-entity>

        <a-entity id="leftHand" 
                  hand-controls="hand: left; handModelStyle: highPoly;"
                  oculus-touch-controls="hand: left"
                  sprint-logic>
        </a-entity>

        <a-entity id="rightHand" 
                  hand-controls="hand: right; handModelStyle: highPoly;"
                  oculus-touch-controls="hand: right"
                  crouch-logic
                  gun-system>
        </a-entity>

        <a-box id="holster" position="0 0.8 -0.2" width="0.3" height="0.1" depth="0.2" opacity="0.3" color="red">
             <a-text value="WEAPON" align="center" position="0 0.1 0" scale="0.2 0.2 0.2"></a-text>
        </a-box>
      </a-entity>

    </a-scene>

    <script>
      // 1. SPRINT LOGIC (Left Stick Click)
      AFRAME.registerComponent('sprint-logic', {
        init: function () {
          this.el.addEventListener('thumbstickdown', () => {
            const rig = document.querySelector('#rig');
            rig.setAttribute('movement-controls', 'speed', 0.5); // Sprint speed
            console.log("Sprinting...");
          });
          this.el.addEventListener('thumbstickup', () => {
            const rig = document.querySelector('#rig');
            rig.setAttribute('movement-controls', 'speed', 0.2); // Normal speed
          });
        }
      });

      // 2. CROUCH LOGIC (Right Stick Click)
      AFRAME.registerComponent('crouch-logic', {
        init: function () {
          let isCrouched = false;
          this.el.addEventListener('thumbstickdown', () => {
            const camera = document.querySelector('#camera');
            isCrouched = !isCrouched;
            camera.setAttribute('position', isCrouched ? '0 1.0 0' : '0 1.6 0');
          });
        }
      });

      // 3. GUN & HOLSTER SYSTEM
      AFRAME.registerComponent('gun-system', {
        init: function () {
          let hasGun = false;
          const holster = document.querySelector('#holster');
          const rightHand = this.el;

          this.el.addEventListener('gripdown', () => {
            // Check if hand is near waist (holster)
            const handPos = rightHand.object3D.position;
            const holsterPos = holster.object3D.position;
            
            if (!hasGun && handPos.distanceTo(holsterPos) < 0.6) {
              // Attach Gun to Hand
              const gun = document.createElement('a-entity');
              gun.setAttribute('id', 'playerGun');
              gun.setAttribute('gltf-model', '#gunModel');
              gun.setAttribute('scale', '0.1 0.1 0.1');
              gun.setAttribute('rotation', '0 180 0');
              rightHand.appendChild(gun);
              hasGun = true;
              console.log("Weapon Equipped");
            }
          });

          this.el.addEventListener('triggerdown', () => {
            if (hasGun) {
              console.log("BANG!");
              // Add Muzzle Flash / Sound here
            }
          });
        }
      });

      // 4. ECONOMY (Fake Money)
      let money = 0;
      function addKillMoney() {
        money += 5;
        console.log("Total Cash: $" + money);
      }
    </script>
  </body>
</html>
