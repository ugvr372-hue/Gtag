<!DOCTYPE html>
<html>
  <head>
    <title>QUEST 3 ULTRA-SANDBOX</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://mixedreality.mozilla.org/ammo.js/builds/ammo.wasm.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/n5ro/aframe-physics-system@v4.0.1/dist/aframe-physics-system.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene 
      physics="driver: ammo; debug: false; gravity: -9.8; iterations: 50"
      renderer="antialias: true; colorManagement: true; exposure: 1.2; toneMapping: ACESFilmic"
      shadow="type: pcfsoft">
      
      <a-assets>
        <a-asset-item id="glock-model" src="glock.glb"></a-asset-item>
        <a-mixin id="physics-object" ammo-body="type: dynamic; mass: 5" ammo-shape="type: box"></a-mixin>
      </a-assets>

      <a-entity environment="preset: arches; dressingAmount: 0; groundColor: #111; grid: none; lighting: none; skyType: gradient; skyColor: #050505; horizonColor: #111"></a-entity>

      <a-entity light="type: ambient; intensity: 0.2"></a-entity>
      <a-entity light="type: directional; intensity: 0.8; castShadow: true; shadowMapHeight: 2048; shadowMapWidth: 2048; shadowCameraLeft: -10; shadowCameraRight: 10" position="-5 10 5"></a-entity>
      <a-entity light="type: point; intensity: 1.5; color: #ff0000; distance: 10" position="0 3 -2" animation="property: light.intensity; from: 1.5; to: 0.8; dir: alternate; dur: 2000; loop: true"></a-entity>

      <a-box 
        ammo-body="type: static" ammo-shape="type: box"
        position="0 -0.5 0" width="50" height="1" depth="50" 
        color="#222" roughness="0.8" shadow="receive: true">
      </a-box>

      <a-entity id="box-tower" position="0 0 -5">
        <a-box mixin="physics-object" position="0 0.5 0" color="#4CC3D9" shadow></a-box>
        <a-box mixin="physics-object" position="0 1.6 0" color="#FFC65D" shadow></a-box>
        <a-box mixin="physics-object" position="0.5 2.7 0" color="#7BC8A4" shadow></a-box>
      </a-entity>

      <a-entity id="player-rig">
        <a-camera position="0 1.6 0" look-controls="pointerLockEnabled: true"></a-camera>
        
        <a-entity hand-controls="hand: left" ammo-body="type: kinematic" ammo-shape="type: sphere; fit: manual; sphereRadius: 0.05"></a-entity>
        
        <a-entity id="right-hand" hand-controls="hand: right" ammo-body="type: kinematic" ammo-shape="type: sphere; fit: manual; sphereRadius: 0.05">
          <a-entity 
            gltf-model="#glock-model" 
            position="0 -0.05 -0.1" 
            rotation="-90 0 0" 
            scale="0.01 0.01 0.01">
          </a-entity>
        </a-entity>
      </a-entity>

      <a-text value="VR SANDBOX ALPHA" position="0 2.5 -3" align="center" color="#fff" shader="msdf"></a-text>
      <a-text value="Use Grip to interact with objects" position="0 2.2 -3" align="center" scale="0.5" color="#aaa"></a-text>

    </a-scene>

    <script>
      // Quick script to allow grabbing with Ammo physics
      AFRAME.registerComponent('grab-mechanic', {
        init: function () {
          // You could add logic here to "weld" objects to hands on button press
        }
      });
    </script>
  </body>
</html>
