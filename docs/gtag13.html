<!DOCTYPE html>
<html>
<head>
  <title>VR Dentist Simulator</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- Physics -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.1/dist/aframe-physics-system.min.js"></script>
</head>

<body>
<a-scene physics="gravity: -9.8" vr-mode-ui="enabled: true">

  <!-- Player with movement -->
  <a-entity id="rig" movement-controls="speed: 0.2">
    
    <a-camera position="0 1.6 0"></a-camera>

    <!-- Dental Tool Hands -->
    <a-entity id="leftHand"
      laser-controls="hand: left"
      raycaster="objects: .tooth"
      line="color: blue">
      
      <!-- Tool visual -->
      <a-cylinder radius="0.02" height="0.3" color="silver"></a-cylinder>
    </a-entity>

    <a-entity id="rightHand"
      laser-controls="hand: right"
      raycaster="objects: .tooth"
      line="color: red">
      
      <!-- Tool visual -->
      <a-cylinder radius="0.02" height="0.3" color="white"></a-cylinder>
    </a-entity>

  </a-entity>

  <!-- Environment -->
  <a-plane rotation="-90 0 0" width="20" height="20" color="#ddd"></a-plane>
  <a-sky color="#CCEFFF"></a-sky>

  <!-- Patient Head -->
  <a-sphere position="0 1 -3" radius="1.2" color="#FFD1A4"></a-sphere>

  <!-- Mouth -->
  <a-box position="0 0.6 -2.2" width="1.5" height="0.6" depth="0.2" color="black"></a-box>

  <!-- Teeth with physics -->
  <a-box class="tooth" position="-0.6 0.8 -2" width="0.3" height="0.4" depth="0.2"
    color="brown" dynamic-body></a-box>

  <a-box class="tooth" position="0 0.8 -2" width="0.3" height="0.4" depth="0.2"
    color="brown" dynamic-body></a-box>

  <a-box class="tooth" position="0.6 0.8 -2" width="0.3" height="0.4" depth="0.2"
    color="brown" dynamic-body></a-box>

  <!-- Floating dirt balls -->
  <a-sphere class="dirt" position="-1 2 -3" radius="0.2" color="green" dynamic-body></a-sphere>
  <a-sphere class="dirt" position="1 2 -3" radius="0.2" color="green" dynamic-body></a-sphere>

  <!-- UI -->
  <a-text id="status"
    value="Move with joystick/WASD. Clean or shoot teeth!"
    position="-2 3 -3"
    width="5"
    color="black"></a-text>

</a-scene>

<script>
const teeth = document.querySelectorAll('.tooth');
const status = document.querySelector('#status');
const hands = document.querySelectorAll('[laser-controls]');

let cleaned = 0;

// Cleaning mechanic
hands.forEach(hand => {
  hand.addEventListener('triggerdown', () => {
    const intersected = hand.components.raycaster.intersectedEls;

    if (intersected.length > 0) {
      const target = intersected[0];

      if (target.classList.contains('tooth')) {
        if (target.getAttribute('color') === 'brown') {
          target.setAttribute('color', 'white');
          cleaned++;

          target.body.applyImpulse(
            {x: 0, y: 2, z: -1},
            {x: 0, y: 0, z: 0}
          );

          status.setAttribute('value', cleaned + " teeth cleaned!");

          if (cleaned === teeth.length) {
            status.setAttribute('value', "All teeth clean 😎 You're a pro dentist!");
          }
        }
      }
    }
  });
});

// Random movement for dirt (fun physics chaos)
setInterval(() => {
  document.querySelectorAll('.dirt').forEach(d => {
    if (d.body) {
      d.body.applyImpulse(
        {
          x: (Math.random() - 0.5) * 2,
          y: Math.random() * 2,
          z: (Math.random() - 0.5) * 2
        },
        {x: 0, y: 0, z: 0}
      );
    }
  });
}, 2000);

</script>

</body>
</html>
