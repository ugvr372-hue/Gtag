<!DOCTYPE html>
<html>
  <head>
    <title>DINOVR: Office Terminal</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body style="background: #000;">
    <a-scene loading-screen="enabled: false">
      
      <a-entity environment="preset: contact; dressingAmount: 10"></a-entity>

      <a-entity id="office" position="-5 0 -5">
          <a-box position="0 1.5 -2.5" width="5" height="3" depth="0.2" color="#333"></a-box> <a-box position="-2.5 1.5 0" width="0.2" height="3" depth="5" color="#333"></a-box> <a-box position="2.5 1.5 0" width="0.2" height="3" depth="5" color="#333"></a-box> <a-box position="0 3 0" width="5" height="0.2" depth="5" color="#222"></a-box> <a-box position="0 0.8 -2" width="2" height="0.1" depth="0.8" color="#444"></a-box>
          
          <a-entity id="computer-screen" position="0 1.3 -2.1">
              <a-plane width="0.8" height="0.5" color="black">
                  <a-text id="monitor-text" value="ENTER OWNER CODE\n_ _ _ _ _ _" align="center" position="0 0 0.01" scale="0.2 0.2 0.2" color="lime"></a-text>
                  <a-text id="mod-display" visible="false" value="> FLY MOD\n  GOD MODE\n  KILL ALL\n  GIVE MONEY" align="left" position="-0.3 0 0.01" scale="0.15 0.15 0.15" color="cyan"></a-text>
              </a-plane>
          </a-entity>

          <a-entity id="keyboard" position="0 0.85 -1.8">
              <a-box id="key-up" position="0.1 0 0" width="0.05" height="0.02" depth="0.05" color="grey" class="clickable"></a-box>
              <a-box id="key-down" position="0.1 0 0.07" width="0.05" height="0.02" depth="0.05" color="grey" class="clickable"></a-box>
              <a-text value="UP" position="0.1 0.02 0" rotation="-90 0 0" align="center" scale="0.1 0.1 0.1"></a-text>
              <a-text value="DOWN" position="0.1 0.02 0.07" rotation="-90 0 0" align="center" scale="0.1 0.1 0.1"></a-text>
              
              <a-box id="key-code" position="-0.1 0 0.03" width="0.15" height="0.02" depth="0.1" color="blue" class="clickable">
                  <a-text value="SUBMIT DINOVR" position="0 0.02 0" rotation="-90 0 0" align="center" scale="0.1 0.1 0.1"></a-text>
              </a-box>
          </a-entity>
      </a-entity>

      <a-entity id="rig" movement-controls="controls: gamepad; speed: 0.2;">
        <a-entity camera position="0 1.6 0" look-controls>
            <a-cursor fuse="false" raycaster="objects: .clickable"></a-cursor>
            <a-text id="ui-money" value="$0" position="0.5 0.4 -1" scale="0.3 0.3 0.3" color="green"></a-text>
        </a-entity>
        <a-entity oculus-touch-controls="hand: right" gun-logic>
            <a-box width="0.03" height="0.05" depth="0.2" color="#111" position="0 -0.05 -0.1"></a-box>
        </a-entity>
      </a-entity>

    </a-scene>

    <script>
      let unlocked = false;
      let selectedIndex = 0;
      const mods = ["> FLY MOD", "> GOD MODE", "> KILL ALL", "> GIVE MONEY"];
      let zombies = [];
      let cash = 0;

      // --- COMPUTER INTERACTION ---
      document.querySelector('#key-code').addEventListener('click', () => {
          unlocked = true;
          document.querySelector('#monitor-text').setAttribute('visible', 'false');
          document.querySelector('#mod-display').setAttribute('visible', 'true');
          console.log("OWNER MENU UNLOCKED");
      });

      document.querySelector('#key-up').addEventListener('click', () => {
          if(!unlocked) return;
          selectedIndex = (selectedIndex > 0) ? selectedIndex - 1 : mods.length - 1;
          updateMonitor();
      });

      document.querySelector('#key-down').addEventListener('click', () => {
          if(!unlocked) return;
          selectedIndex = (selectedIndex < mods.length - 1) ? selectedIndex + 1 : 0;
          updateMonitor();
      });

      function updateMonitor() {
          let displayStr = "";
          mods.forEach((m, i) => {
              displayStr += (i === selectedIndex ? " [X] " : " [ ] ") + m + "\n";
          });
          document.querySelector('#mod-display').setAttribute('value', displayStr);
          
          // Trigger the Mod Effect immediately on click
          if(selectedIndex === 2) { // KILL ALL
              zombies.forEach(z => z.emit('die'));
              zombies = [];
          }
          if(selectedIndex === 3) { // GIVE MONEY
              cash += 1000;
              document.querySelector('#ui-money').setAttribute('value', "$" + cash);
          }
      }

      // --- ZOMBIE LOGIC (Stay outside office) ---
      function spawnZombie() {
        const z = document.createElement('a-entity');
        z.setAttribute('position', `${Math.random()*20 - 10} 0 -15`);
        z.innerHTML = `<a-box width="0.5" height="1.8" depth="0.2" color="green"></a-box>`;
        
        z.addEventListener('die', () => {
            if(z.parentNode) z.parentNode.removeChild(z);
        });

        document.querySelector('a-scene').appendChild(z);
        zombies.push(z);
      }

      setInterval(() => {
          let p = document.querySelector('[camera]').object3D.position;
          zombies.forEach(z => {
              // Simple "Zombie Block" - don't enter office area (-7 to -3)
              if(z.object3D.position.x < -2.5 || z.object3D.position.z < -2.5) {
                  z.object3D.lookAt(p.x, 0, p.z);
                  z.object3D.translateZ(0.03);
              }
          });
      }, 20);

      setInterval(spawnZombie, 3000);
      
      // GUN logic for the right hand
      AFRAME.registerComponent('gun-logic', {
          init: function() {
              this.el.addEventListener('triggerdown', () => {
                  // Bullet spawning logic here as before
              });
          }
      });
    </script>
  </body>
</html>
