<!DOCTYPE html>
<html>
  <head>
    <title>GunGame: Office Terminal Fixed</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body style="background: #000;">
    <a-scene loading-screen="enabled: false" renderer="antialias: true">
      
      <a-entity environment="preset: contact; dressingAmount: 10"></a-entity>

      <a-entity id="office" position="-5 0 -5">
          <a-box position="0 1.5 -2.5" width="5" height="3" depth="0.2" color="#444"></a-box> <a-box position="-2.5 1.5 0" width="0.2" height="3" depth="5" color="#444"></a-box> <a-box position="2.5 1.5 0" width="0.2" height="3" depth="5" color="#444"></a-box> <a-box position="0 0.8 -2" width="2" height="0.1" depth="0.8" color="#222"></a-box> <a-plane id="terminal" position="0 1.3 -2.1" width="0.8" height="0.5" color="black">
              <a-text id="monitor-text" value="DINOVR TERMINAL\nPRESS SUBMIT TO UNLOCK" align="center" position="0 0 0.01" scale="0.15 0.15 0.15" color="lime"></a-text>
          </a-plane>

          <a-box id="key-submit" position="0 0.85 -1.7" width="0.2" height="0.05" depth="0.1" color="blue" class="clickable">
              <a-text value="SUBMIT" rotation="-90 0 0" align="center" position="0 0.03 0" scale="0.1 0.1 0.1"></a-text>
          </a-box>
      </a-entity>

      <a-entity id="rig" movement-controls="controls: gamepad; speed: 0.2;">
        <a-entity id="camera" camera position="0 1 0" look-controls>
            <a-cursor fuse="false" raycaster="objects: .clickable"></a-cursor>
        </a-entity>
        
        <a-entity id="rightHand" oculus-touch-controls="hand: right" 
                  raycaster="objects: .zombie-hitbox; far: 50; showLine: true" 
                  line="color: red; opacity: 0.5"
                  gun-logic>
            <a-entity position="0 -0.05 -0.1">
                <a-box width="0.03" height="0.05" depth="0.2" color="#111"></a-box>
                <a-entity id="muzzle-flash" visible="false" position="0 0 -0.12">
                    <a-sphere radius="0.03" color="yellow"></a-sphere>
                </a-entity>
            </a-entity>
        </a-entity>
      </a-entity>

    </a-scene>

    <script>
      let zombies = [];
      let unlocked = false;

      // --- HEIGHT CALIBRATOR (RUNS ON LOAD) ---
      window.onload = () => {
          const cam = document.querySelector('#camera');
          // Forces player to exactly 1 meter off the ground
          cam.setAttribute('position', {x: 0, y: 1.0, z: 0});
          console.log("Height calibrated to 1 meter.");
      };

      // --- GUN LOGIC ---
      AFRAME.registerComponent('gun-logic', {
          init: function() {
              const flash = document.querySelector('#muzzle-flash');
              this.el.addEventListener('triggerdown', () => {
                  // Muzzle Flash
                  flash.setAttribute('visible', 'true');
                  setTimeout(() => flash.setAttribute('visible', 'false'), 50);

                  // Raycast Check
                  const ray = this.el.components.raycaster;
                  const hit = ray.getIntersection(document.querySelector('.zombie-hitbox'));
                  if (hit) {
                      hit.el.closest('.zombie-wrapper').emit('die');
                  }
              });
          }
      });

      // --- MOD MENU UNLOCK ---
      document.querySelector('#key-submit').addEventListener('click', () => {
          unlocked = true;
          document.querySelector('#monitor-text').setAttribute('value', "OWNER LOGGED IN\nMODS ACTIVE:\nFLY: HOLD Y\nKILL ALL: GRIP");
          document.querySelector('#monitor-text').setAttribute('color', 'cyan');
      });

      // --- ZOMBIE SPAWNER & AI ---
      function spawnZombie() {
        const z = document.createElement('a-entity');
        z.classList.add('zombie-wrapper');
        const ang = Math.random() * 6.28;
        z.setAttribute('position', `${Math.cos(ang)*15} 0 ${Math.sin(ang)*15}`);
        
        z.innerHTML = `
            <a-box class="zombie-hitbox" width="0.6" height="1.8" depth="0.3" color="#2d3319">
                <a-box width="0.2" height="0.2" depth="0.2" position="0 0.8 0.15" color="red"></a-box>
            </a-box>`;
        
        z.addEventListener('die', () => {
            if(z.parentNode) z.parentNode.removeChild(z);
        });

        document.querySelector('a-scene').appendChild(z);
        zombies.push(z);
      }

      setInterval(() => {
          let p = document.querySelector('#camera').object3D.position;
          zombies.forEach(z => {
              let zPos = z.object3D.position;
              
              // WALL COLLISION: Zombies stop at the office walls (-2.5 to 2.5)
              let inOfficeRangeX = zPos.x > -7.5 && zPos.x < -2.5;
              let inOfficeRangeZ = zPos.z > -7.5 && zPos.z < -2.5;

              if (!(inOfficeRangeX && inOfficeRangeZ)) {
                  z.object3D.lookAt(p.x, 0, p.z);
                  z.object3D.translateZ(0.04);
              }
          });
      }, 20);

      setInterval(spawnZombie, 2500);
    </script>
  </body>
</html>
